<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect: convert path to query param so GitHub Pages serves index.html
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace('/' + '?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
