sult\n            }\n        }(i)\n    }\n    \n    wg.Wait()\n    close(results)\n}\n\n// Usage\njobs := make(chan Job, 100)\nresults := make(chan Result, 100)\n\ngo workerPool(jobs, results, 5)\n\n// Send jobs\nfor _, job := range jobList {\n    jobs <- job\n}\nclose(jobs)\n\n// Collect results\nfor result := range results {\n    // handle result\n}\n```\n\n### Barrier (sync.WaitGroup)\n\n```go\nfunc parallelProcessing(items []Item) []Result {\n    results := make([]Result, len(items))\n    var wg sync.WaitGroup\n    \n    for i, item := range items {\n        wg.Add(1)\n        go func(idx int, it Item) {\n            defer wg.Done()\n            results[idx] = process(it)\n        }(i, item)\n    }\n    \n    wg.Wait()  // barrier\n    return results\n}\n```\n\n### Semaphore (Buffered Channel)\n\n```go\nfunc boundedExecution(tasks []func(), maxConcurrent int) {\n    sem := make(chan struct{}, maxConcurrent)\n    var wg sync.WaitGroup\n    \n    for _, task := range tasks {\n        wg.Add(1)\n        sem <- struct{}{}  // acquire\n        go func(t func()) {\n            defer wg.Done()\n            defer func() { <-sem }()  // release\n            t()\n        }(task)\n    }\n    \n    wg.Wait()\n}\n```\n\n### Pub/Sub\n\n```go\ntype Message struct {\n    Topic string\n    Data  any\n}\n\ntype PubSub struct {\n    mu       sync.RWMutex\n    subs     map[string][]chan Message\n}\n\nfunc NewPubSub() *PubSub {\n    return &PubSub{subs: make(map[string][]chan Message)}\n}\n\nfunc (p *PubSub) Subscribe(topic string, bufSize int) chan Message {\n    ch := make(chan Message, bufSize)\n    p.mu.Lock()\n    p.subs[topic] = append(p.subs[topic], ch)\n    p.mu.Unlock()\n    return ch\n}\n\nfunc (p *PubSub) Publish(topic string, data any) {\n    msg := Message{Topic: topic, Data: data}\n    p.mu.RLock()\n    defer p.mu.RUnlock()\n    for _, ch := range p.subs[topic] {\n        select {\n        case ch <- msg:\n        default:  // non-blocking\n        }\n    }\n}\n```\n\n### Rate Limiting (Token Bucket)\n\n```go\ntype RateLimiter struct {\n    rate     float64\n    tokens   float64\n    maxTokens float64\n    lastTime time.Time\n    mu       sync.Mutex\n}\n\nfunc NewRateLimiter(rate float64, burst int) *RateLimiter {\n    return &RateLimiter{\n        rate:      rate,\n        maxTokens: float64(burst),\n        tokens:    float64(burst),\n        lastTime:  time.Now(),\n    }\n}\n\nfunc (r *RateLimiter) Allow() bool {\n    r.mu.Lock()\n    defer r.mu.Unlock()\n    \n    now := time.Now()\n    elapsed := now.Sub(r.lastTime).Seconds()\n    r.lastTime = now\n    \n    r.tokens += elapsed * r.rate\n    if r.tokens > r.maxTokens {\n        r.tokens = r.maxTokens\n    }\n    \n    if r.tokens >= 1 {\n        r.tokens--\n        return true\n    }\n    return false\n}\n\n// Usage with ticker\nlimiter := NewRateLimiter(100, 50)  // 100 req/sec, burst 50\n\nfor _, req := range requests {\n    if limiter.Allow() {\n        process(req)\n    } else {\n        time.Sleep(10 * time.Millisecond)\n    }\n}\n```\n\n---\n\n## 5. Error Handling Patterns\n\n### Sentinel Errors\n\n```go\n// Predefined errors as package-level variables\nvar (\n    ErrNotFound     = errors.New(\"not found\")\n    ErrPermission   = errors.New(\"permission denied\")\n    ErrInvalidInput = errors.New(\"invalid input\")\n)\n\n// Usage\nif errors.Is(err, ErrNotFound) {\n    // handle not found\n}\n```\n\n### Error Wrapping\n\n```go\n// Go 1.20+ supports multiple wrapping\nerr := fmt.Errorf(\"database: %w\", ErrNotFound)\nerr = fmt.Errorf(\"handler: %w\", err)\n\n// Check with errors.Is (checks entire chain)\nerrors.Is(err, ErrNotFound)  // true\n\n// Check with errors.As (type assertion)\nvar myErr *MyError\nif errors.As(err, &myErr) {\n    fmt.Println(myErr.Code)\n}\n```\n\n### Custom Error Types\n\n```go\ntype ValidationError struct {\n    Field   string\n    Message string\n}\n\nfunc (e *ValidationError) Error() string {\n    return fmt.Sprintf(\"%s: %s\", e.Field, e.Message)\n}\n\n// Usage\nfunc validateAge(age int) error {\n    if age < 0 {\n        return &ValidationError{Field: \"age\", Message: \"must be positive\"}\n    }\n    return nil\n}\n\n// Check type\nvar ve *ValidationError\nif errors.As(err, &ve) {\n    fmt.Printf(\"Validation failed on field: %s\\n\", ve.Field)\n}\n```\n\n---\n\n## 6. Context Patterns\n\n### Context Propagation\n\n```go\nfunc main() {\n    ctx := context.Background()\n    \n    // Add timeout\n    ctx, cancel := context.WithTimeout(ctx, 5*time.Second)\n    defer cancel()\n    \n    // Call with context\n    result, err := fetchData(ctx, \"api/data\")\n}\n\nfunc fetchData(ctx context.Context, url string) ([]byte, error) {\n    req, _ := http.NewRequestWithContext(ctx, \"GET\", url, nil)\n    resp, err := http.DefaultClient.Do(req)\n    if err != nil {\n        return nil, err  // automatically cancelled\n    }\n    return io.ReadAll(resp.Body)\n}\n```\n\n### Timeout & Cancellation\n\n```go\nfunc requestWithTimeout(url string, timeout time.Duration) ([]byte, error) {\n    ctx, cancel := context.WithTimeout(context.Background(), timeout)\n    defer cancel()\n    \n    return fetchData(ctx, url)\n}\n\n// Multiple operations with context\nfunc multiOperation(ctx context.Context) error {\n    select {\n    case <-ctx.Done():\n        return ctx.Err()\n    default:\n    }\n    \n    if err := operation1(ctx); err != nil {\n        return err\n    }\n    \n    return operation2(ctx)\n}\n```\n\n### Context with Values\n\n```go\n// Define key as unexported type to prevent collisions\ntype contextKey string\n\nconst (\n    requestIDKey contextKey = \"request_id\"\n    userIDKey    contextKey = \"user_id\"\n)\n\nfunc WithRequestID(ctx context.Context, id string) context.Context {\n    return context.WithValue(ctx, requestIDKey, id)\n}\n\nfunc GetRequestID(ctx context.Context) string {\n    if id, ok := ctx.Value(requestIDKey).(string); ok {\n        return id\n    }\n    return \"\"\n}\n\n// Usage in handler\nfunc handler(w http.ResponseWriter, r *http.Request) {\n    ctx := WithRequestID(r.Context(), generateID())\n    \n    // Pass ctx to downstream functions\n    processRequest(ctx)\n}\n```\n\n---\n\n## Quick Reference\n\n| Pattern | Use Case | Key Components |\n|---------|----------|---------------|\n| Factory | Hide implementation | Interface return |\n| Builder | Complex construction | Fluent API |\n| Singleton | Shared resource | sync.Once |\n| Decorator | Add behavior | Interface wrapping |\n| Adapter | Bridge interfaces | Interface conversion |\n| Strategy | Algorithm selection | Interface |\n| Observer | Event handling | Channel subscription |\n| Pipeline | Data processing | Chained channels |\n| Worker Pool | Limit concurrency | Fixed goroutines |\n| Rate Limiter | Control throughput | Token bucket |\n\n---\n\n## Interview Tips\n\n1. **Go doesn't have classes** \u2014 use functions + structs for OOP\n2. **Prefer interfaces** \u2014 define behavior, not data\n3. **Concurrency is cheap** \u2014 don't fear goroutines, but synchronize properly\n4. **Context is for cancellation** \u2014 pass it through all request paths\n5. **Errors are values** \u2014 handle them explicitly, don't panic for expected cases\n"}, {"id": "testing", "file": "testing.md", "title": "Testing", "time": "20 min", "icon": "\ud83e\uddea", "content": "# Go Testing & Benchmarking Cheatsheet\n\n> Testing patterns, benchmarks, and quality tools for senior Go interviews.\n\n---\n\n## Table of Contents\n1. [Test Basics](#1-test-basics)\n2. [Table-Driven Tests](#2-table-driven-tests)\n3. [Subtests & Parallel](#3-subtests--parallel)\n4. [Test Helpers](#4-test-helpers)\n5. [Mocking & Interfaces](#5-mocking--interfaces)\n6. [Benchmarking](#6-benchmarking)\n7. [Fuzzing](#7-fuzzing)\n8. [Test Fixtures & Golden Files](#8-test-fixtures--golden-files)\n9. [Coverage & Tooling](#9-coverage--tooling)\n\n---\n\n## 1. Test Basics\n\n### Test Function Signature\n\n```go\n// File: math_test.go (must end in _test.go)\npackage math\n\nimport \"testing\"\n\nfunc TestAdd(t *testing.T) {\n    got := Add(2, 3)\n    want := 5\n    if got != want {\n        t.Errorf(\"Add(2,3) = %d, want %d\", got, want)\n    }\n}\n```\n\n### t.Fatal vs t.Error\n\n```go\nt.Error(\"...\")   // logs error, test continues\nt.Errorf(...)    // formatted, test continues\nt.Fatal(\"...\")   // logs error, test STOPS immediately\nt.Fatalf(...)    // formatted, test STOPS\nt.Skip(\"...\")    // skip this test\nt.Helper()       // marks func as helper \u2014 errors report caller's line\n```\n\n### Running Tests\n\n```bash\ngo test ./...                    # all packages\ngo test -v ./pkg/...             # verbose\ngo test -run TestAdd             # specific test\ngo test -run TestAdd/case_name   # specific subtest\ngo test -count=1 ./...           # disable test caching\ngo test -race ./...              # race detector\ngo test -short ./...             # skip long tests\ngo test -timeout 30s ./...       # timeout\n```\n\n---\n\n## 2. Table-Driven Tests\n\n### Standard Pattern\n\n```go\nfunc TestMultiply(t *testing.T) {\n    tests := []struct {\n        name     string\n        a, b     int\n        expected int\n    }{\n        {\"positive\", 2, 3, 6},\n        {\"zero\", 5, 0, 0},\n        {\"negative\", -2, 3, -6},\n        {\"both negative\", -2, -3, 6},\n    }\n\n    for _, tt := range tests {\n        t.Run(tt.name, func(t *testing.T) {\n            got := Multiply(tt.a, tt.b)\n            if got != tt.expected {\n                t.Errorf(\"Multiply(%d, %d) = %d, want %d\",\n                    tt.a, tt.b, got, tt.expected)\n            }\n        })\n    }\n}\n```\n\n### With Error Cases\n\n```go\ntests := []struct {\n    name    string\n    input   string\n    want    int\n    wantErr bool\n}{\n    {\"valid\", \"42\", 42, false},\n    {\"empty\", \"\", 0, true},\n    {\"overflow\", \"99999999999999999999\", 0, true},\n}\n\nfor _, tt := range tests {\n    t.Run(tt.name, func(t *testing.T) {\n        got, err := Parse(tt.input)\n        if (err != nil) != tt.wantErr {\n            t.Fatalf(\"Parse(%q) error = %v, wantErr %v\", tt.input, err, tt.wantErr)\n        }\n        if got != tt.want {\n            t.Errorf(\"Parse(%q) = %d, want %d\", tt.input, got, tt.want)\n        }\n    })\n}\n```\n\n---\n\n## 3. Subtests & Parallel\n\n### Parallel Tests\n\n```go\nfunc TestParallel(t *testing.T) {\n    tests := []struct{ name, input, want string }{\n        {\"case1\", \"hello\", \"HELLO\"},\n        {\"case2\", \"world\", \"WORLD\"},\n    }\n\n    for _, tt := range tests {\n        t.Run(tt.name, func(t *testing.T) {\n            t.Parallel() // runs concurrently with other parallel subtests\n            got := strings.ToUpper(tt.input)\n            if got != tt.want {\n                t.Errorf(\"got %q, want %q\", got, tt.want)\n            }\n        })\n    }\n}\n```\n\n> **Note**: Since Go 1.22, loop variables are per-iteration \u2014 no need for `tt := tt` copy.\n\n### TestMain \u2014 Setup/Teardown\n\n```go\nfunc TestMain(m *testing.M) {\n    // Setup (runs once before all tests in package)\n    db := setupTestDB()\n\n    code := m.Run() // run all tests\n\n    // Teardown\n    db.Close()\n    os.Exit(code)\n}\n```\n\n---\n\n## 4. Test Helpers\n\n### Helper Function\n\n```go\nfunc assertEqual[T comparable](t *testing.T, got, want T) {\n    t.Helper() // error points to caller, not this function\n    if got != want {\n        t.Errorf(\"got %v, want %v\", got, want)\n    }\n}\n\nfunc assertError(t *testing.T, err error) {\n    t.Helper()\n    if err == nil {\n        t.Fatal(\"expected error, got nil\")\n    }\n}\n\nfunc assertNoError(t *testing.T, err error) {\n    t.Helper()\n    if err != nil {\n        t.Fatalf(\"unexpected error: %v\", err)\n    }\n}\n```\n\n### Temp Directory\n\n```go\nfunc TestWriteFile(t *testing.T) {\n    dir := t.TempDir() // auto-cleaned up after test\n    path := filepath.Join(dir, \"test.txt\")\n    err := os.WriteFile(path, []byte(\"hello\"), 0644)\n    assertNoError(t, err)\n}\n```\n\n### Cleanup Function\n\n```go\nfunc TestWithResource(t *testing.T) {\n    conn := openConnection()\n    t.Cleanup(func() {\n        conn.Close() // runs after test completes (like defer but for tests)\n    })\n    // use conn...\n}\n```\n\n---\n\n## 5. Mocking & Interfaces\n\n### Interface-Based Mocking (Idiomatic Go)\n\n```go\n// Production code\ntype UserStore interface {\n    GetUser(id string) (*User, error)\n    SaveUser(u *User) error\n}\n\ntype UserService struct {\n    store UserStore\n}\n\nfunc (s *UserService) Greet(id string) (string, error) {\n    u, err := s.store.GetUser(id)\n    if err != nil { return \"\", err }\n    return \"Hello, \" + u.Name, nil\n}\n\n// Test mock\ntype mockUserStore struct {\n    users map[string]*User\n    err   error\n}\n\nfunc (m *mockUserStore) GetUser(id string) (*User, error) {\n    if m.err != nil { return nil, m.err }\n    u, ok := m.users[id]\n    if !ok { return nil, ErrNotFound }\n    return u, nil\n}\nfunc (m *mockUserStore) SaveUser(u *User) error { return m.err }\n\nfunc TestGreet(t *testing.T) {\n    svc := &UserService{\n        store: &mockUserStore{\n            users: map[string]*User{\"1\": {Name: \"Alice\"}},\n        },\n    }\n    got, err := svc.Greet(\"1\")\n    assertNoError(t, err)\n    assertEqual(t, got, \"Hello, Alice\")\n}\n```\n\n### HTTP Test Server\n\n```go\nfunc TestAPIClient(t *testing.T) {\n    srv := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n        assertEqual(t, r.URL.Path, \"/api/users/1\")\n        w.Header().Set(\"Content-Type\", \"application/json\")\n        json.NewEncoder(w).Encode(User{Name: \"Alice\"})\n    }))\n    defer srv.Close()\n\n    client := NewClient(srv.URL)\n    user, err := client.GetUser(\"1\")\n    assertNoError(t, err)\n    assertEqual(t, user.Name, \"Alice\")\n}\n```\n\n### HTTP Handler Test (without server)\n\n```go\nfunc TestHandler(t *testing.T) {\n    req := httptest.NewRequest(\"GET\", \"/health\", nil)\n    rec := httptest.NewRecorder()\n\n    HealthHandler(rec, req)\n\n    assertEqual(t, rec.Code, http.StatusOK)\n    assertEqual(t, rec.Body.String(), `{\"status\":\"ok\"}`)\n}\n```\n\n---\n\n## 6. Benchmarking\n\n### Basic Benchmark\n\n```go\nfunc BenchmarkFib(b *testing.B) {\n    for i := 0; i < b.N; i++ {\n        Fib(20)\n    }\n}\n// Run: go test -bench=BenchmarkFib -benchmem\n```\n\n### Benchmark with Setup\n\n```go\nfunc BenchmarkSort(b *testing.B) {\n    data := generateData(10000) // setup \u2014 not timed\n    b.ResetTimer()              // start timing here\n\n    for i := 0; i < b.N; i++ {\n        sorted := make([]int, len(data))\n        copy(sorted, data)\n        sort.Ints(sorted)\n    }\n}\n```\n\n### Sub-Benchmarks\n\n```go\nfunc BenchmarkMap(b *testing.B) {\n    for _, size := range []int{100, 1000, 10000} {\n        b.Run(fmt.Sprintf(\"size=%d\", size), func(b *testing.B) {\n            m := make(map[int]int, size)\n            for i := 0; i < size; i++ { m[i] = i }\n            b.ResetTimer()\n            for i := 0; i < b.N; i++ {\n                _ = m[size/2]\n            }\n        })\n    }\n}\n```\n\n### Reading Benchmark Output\n\n```\nBenchmarkFib-8    5000000    234 ns/op    0 B/op    0 allocs/op\n               \u2502          \u2502            \u2502          \u2502\n               \u2502          \u2502            \u2502          \u2514\u2500 allocations per op\n               \u2502          \u2502            \u2514\u2500 bytes allocated per op\n               \u2502          \u2514\u2500 nanoseconds per operation\n               \u2514\u2500 iterations run\n```\n\n```bash\ngo test -bench=. -benchmem -count=5 | tee bench.txt\n# Compare: go install golang.org/x/perf/cmd/benchstat@latest\nbenchstat old.txt new.txt\n```\n\n---\n\n## 7. Fuzzing (Go 1.18+)\n\n```go\nfunc FuzzParseJSON(f *testing.F) {\n    // Seed corpus\n    f.Add(`{\"name\":\"alice\",\"age\":30}`)\n    f.Add(`{}`)\n    f.Add(`[]`)\n\n    f.Fuzz(func(t *testing.T, data string) {\n        var result map[string]any\n        err := json.Unmarshal([]byte(data), &result)\n        if err != nil {\n            return // invalid input is fine \u2014 just don't crash\n        }\n        // Re-encode and verify round-trip\n        encoded, err := json.Marshal(result)\n        if err != nil {\n            t.Fatalf(\"Marshal failed after successful Unmarshal: %v\", err)\n        }\n        _ = encoded\n    })\n}\n```\n\n```bash\ngo test -fuzz=FuzzParseJSON -fuzztime=30s\n```\n\n---\n\n## 8. Test Fixtures & Golden Files\n\n### testdata Directory\n\n```go\n// testdata/ is ignored by go build \u2014 perfect for test fixtures\nfunc TestParseConfig(t *testing.T) {\n    data, err := os.ReadFile(\"testdata/config.yaml\")\n    assertNoError(t, err)\n    cfg, err := ParseConfig(data)\n    assertNoError(t, err)\n    assertEqual(t, cfg.Port, 8080)\n}\n```\n\n### Golden File Pattern\n\n```go\nvar update = flag.Bool(\"update\", false, \"update golden files\")\n\nfunc TestRender(t *testing.T) {\n    got := Render(input)\n    golden := filepath.Join(\"testdata\", t.Name()+\".golden\")\n\n    if *update {\n        os.WriteFile(golden, []byte(got), 0644)\n        return\n    }\n\n    want, err := os.ReadFile(golden)\n    assertNoError(t, err)\n    if got != string(want) {\n        t.Errorf(\"output mismatch:\\ngot:\\n%s\\nwant:\\n%s\", got, want)\n    }\n}\n// Update: go test -run TestRender -update\n```\n\n---\n\n## 9. Coverage & Tooling\n\n### Coverage\n\n```bash\ngo test -cover ./...                          # summary\ngo test -coverprofile=cover.out ./...         # profile\ngo tool cover -html=cover.out                 # browser view\ngo tool cover -func=cover.out                 # per-function %\n```\n\n### Race Detector\n\n```bash\ngo test -race ./...          # detect races at test time\ngo build -race ./cmd/server  # race-detect in binary\n```\n\n> Race detector adds ~10x slowdown and 5-10x memory \u2014 don't ship race-enabled binaries.\n\n### Vet & Static Analysis\n\n```bash\ngo vet ./...                 # built-in static checks\ngolangci-lint run            # aggregated linters\n```\n\n---\n\n## Quick Reference\n\n| Command | Purpose |\n|---|---|\n| `go test ./...` | Run all tests |\n| `go test -v -run TestX` | Verbose, specific test |\n| `go test -race ./...` | Race detection |\n| `go test -bench=. -benchmem` | Benchmarks + allocs |\n| `go test -cover -coverprofile=c.out` | Coverage |\n| `go test -fuzz=FuzzX -fuzztime=30s` | Fuzzing |\n| `go test -short` | Skip long tests |\n| `go test -count=1` | Disable cache |\n\n## Interview Tips\n\n- **Always use table-driven tests** \u2014 it's the idiomatic Go pattern\n- **`t.Helper()`** in every helper function \u2014 fixes error line reporting\n- **Interface-based mocking** over mock frameworks \u2014 Go idiom\n- **`httptest`** for HTTP testing \u2014 no external dependencies needed\n- **Benchmarks**: know `b.N`, `b.ResetTimer()`, `-benchmem` flag\n- **Fuzzing** was added in Go 1.18 \u2014 same release as generics\n- **`t.Parallel()`**: mention it for efficiency, but know it requires no shared mutable state\n- **`testdata/`** directory is ignored by `go build` \u2014 use it for fixtures"}, {"id": "system_design", "file": "system-design.md", "title": "System Design", "time": "25 min", "icon": "\ud83c\udf10", "content": "# Go System Design & Production Patterns Cheatsheet\n\n> Senior-level patterns: HTTP/gRPC services, profiling, modules, and production Go.\n\n---\n\n## Table of Contents\n1. [HTTP Server Patterns](#1-http-server-patterns)\n2. [gRPC Patterns](#2-grpc-patterns)\n3. [JSON & Serialization](#3-json--serialization)\n4. [Graceful Shutdown](#4-graceful-shutdown)\n5. [Configuration & DI](#5-configuration--di)\n6. [Profiling & Performance](#6-profiling--performance)\n7. [Modules & Dependencies](#7-modules--dependencies)\n8. [Distributed System Patterns](#8-distributed-system-patterns)\n\n---\n\n## 1. HTTP Server Patterns\n\n### Standard Library Server (Go 1.22+ routing)\n\n```go\nmux := http.NewServeMux()\n\n// Go 1.22+: method + path patterns\nmux.HandleFunc(\"GET /api/users/{id}\", getUser)\nmux.HandleFunc(\"POST /api/users\", createUser)\nmux.HandleFunc(\"GET /health\", healthCheck)\n\nsrv := &http.Server{\n    Addr:              \":8080\",\n    Handler:           mux,\n    ReadHeaderTimeout: 2 * time.Second,\n    ReadTimeout:       5 * time.Second,\n    WriteTimeout:      10 * time.Second,\n    IdleTimeout:       120 * time.Second,\n}\nlog.Fatal(srv.ListenAndServe())\n```\n\n### Path Parameters (Go 1.22+)\n\n```go\nfunc getUser(w http.ResponseWriter, r *http.Request) {\n    id := r.PathValue(\"id\") // Go 1.22+\n    // ...\n}\n```\n\n### Middleware Pattern\n\n```go\ntype Middleware func(http.Handler) http.Handler\n\nfunc Logging(next http.Handler) http.Handler {\n    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n        start := time.Now()\n        next.ServeHTTP(w, r)\n        log.Printf(\"%s %s %v\", r.Method, r.URL.Path, time.Since(start))\n    })\n}\n\nfunc Auth(next http.Handler) http.Handler {\n    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n        token := r.Header.Get(\"Authorization\")\n        if !validToken(token) {\n            http.Error(w, \"unauthorized\", http.StatusUnauthorized)\n            return\n        }\n        next.ServeHTTP(w, r)\n    })\n}\n\n// Chain middlewares\nhandler := Logging(Auth(mux))\n```\n\n### Middleware with Context\n\n```go\ntype contextKey string\n\nfunc WithUserID(next http.Handler) http.Handler {\n    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n        userID := extractUserID(r)\n        ctx := context.WithValue(r.Context(), contextKey(\"userID\"), userID)\n        next.ServeHTTP(w, r.WithContext(ctx))\n    })\n}\n\nfunc getHandler(w http.ResponseWriter, r *http.Request) {\n    userID := r.Context().Value(contextKey(\"userID\")).(string)\n    // ...\n}\n```\n\n### JSON Response Helper\n\n```go\nfunc writeJSON(w http.ResponseWriter, status int, data any) {\n    w.Header().Set(\"Content-Type\", \"application/json\")\n    w.WriteHeader(status)\n    json.NewEncoder(w).Encode(data)\n}\n\nfunc readJSON(r *http.Request, dst any) error {\n    dec := json.NewDecoder(r.Body)\n    dec.DisallowUnknownFields()\n    return dec.Decode(dst)\n}\n```\n\n### Outbound HTTP Client\n\n```go\ntransport := &http.Transport{\n    MaxIdleConns:        100,\n    MaxIdleConnsPerHost: 20,\n    IdleConnTimeout:     90 * time.Second,\n}\n\nclient := &http.Client{\n    Timeout:   10 * time.Second,\n    Transport: transport,\n}\n\ntype User struct {\n    ID string `json:\"id\"`\n}\n\nfunc fetchUser(ctx context.Context, client *http.Client, url string) error {\n    req, err := http.NewRequestWithContext(ctx, http.MethodGet, url, nil)\n    if err != nil { return err }\n\n    resp, err := client.Do(req)\n    if err != nil { return err }\n    defer resp.Body.Close()\n\n    if resp.StatusCode != http.StatusOK {\n        return fmt.Errorf(\"unexpected status: %s\", resp.Status)\n    }\n    var user User\n    return json.NewDecoder(resp.Body).Decode(&user)\n}\n```\n\n> **Production rule**: Reuse `http.Client` and `Transport`; don't create a new client per request. Use both request context and client-level timeout so outbound calls cannot hang forever.\n\n---\n\n## 2. gRPC Patterns\n\n### Proto Definition\n\n```protobuf\nsyntax = \"proto3\";\npackage api;\noption go_package = \"github.com/myapp/api\";\n\nservice UserService {\n    rpc GetUser(GetUserRequest) returns (User);\n    rpc ListUsers(ListUsersRequest) returns (stream User);  // server streaming\n}\n\nmessage GetUserRequest { string id = 1; }\nmessage User {\n    string id = 1;\n    string name = 2;\n    int32 age = 3;\n}\n```\n\n### Server Implementation\n\n```go\ntype server struct {\n    pb.UnimplementedUserServiceServer\n    store UserStore\n}\n\nfunc (s *server) GetUser(ctx context.Context, req *pb.GetUserRequest) (*pb.User, error) {\n    user, err := s.store.Get(ctx, req.Id)\n    if err != nil {\n        return nil, status.Errorf(codes.NotFound, \"user %s not found\", req.Id)\n    }\n    return user.ToProto(), nil\n}\n\n// Server startup\nlis, _ := net.Listen(\"tcp\", \":50051\")\ngrpcServer := grpc.NewServer(\n    grpc.UnaryInterceptor(loggingInterceptor),\n)\npb.RegisterUserServiceServer(grpcServer, &server{store: store})\ngrpcServer.Serve(lis)\n```\n\n### gRPC Interceptors (middleware equivalent)\n\n```go\nfunc loggingInterceptor(\n    ctx context.Context,\n    req any,\n    info *grpc.UnaryServerInfo,\n    handler grpc.UnaryHandler,\n) (any, error) {\n    start := time.Now()\n    resp, err := handler(ctx, req)\n    log.Printf(\"gRPC %s %v err=%v\", info.FullMethod, time.Since(start), err)\n    return resp, err\n}\n```\n\n### gRPC Status Codes\n\n| Code | When |\n|---|---|\n| `codes.OK` | Success |\n| `codes.NotFound` | Resource doesn't exist |\n| `codes.InvalidArgument` | Bad request params |\n| `codes.PermissionDenied` | Auth ok, not authorized |\n| `codes.Unauthenticated` | No/invalid credentials |\n| `codes.Internal` | Server error |\n| `codes.Unavailable` | Transient, retry |\n| `codes.DeadlineExceeded` | Timeout |\n\n---\n\n## 3. JSON & Serialization\n\n### Struct Tags\n\n```go\ntype User struct {\n    ID        string    `json:\"id\"`\n    Name      string    `json:\"name\"`\n    Email     string    `json:\"email,omitempty\"`  // omit if empty\n    Password  string    `json:\"-\"`                // never serialize\n    CreatedAt time.Time `json:\"created_at\"`\n    Age       int       `json:\"age,string\"`       // encode as string\n}\n```\n\n### Custom Marshaler\n\n```go\ntype Duration time.Duration\n\nfunc (d Duration) MarshalJSON() ([]byte, error) {\n    return json.Marshal(time.Duration(d).String())\n}\n\nfunc (d *Duration) UnmarshalJSON(b []byte) error {\n    var s string\n    if err := json.Unmarshal(b, &s); err != nil { return err }\n    dur, err := time.ParseDuration(s)\n    if err != nil { return err }\n    *d = Duration(dur)\n    return nil\n}\n```\n\n### Streaming JSON (large payloads)\n\n```go\n// Encoder writes directly to writer \u2014 no intermediate buffer\nenc := json.NewEncoder(w)\nfor item := range items {\n    enc.Encode(item) // writes one JSON line per item\n}\n\n// Decoder reads from reader \u2014 stream parsing\ndec := json.NewDecoder(r.Body)\nfor dec.More() {\n    var item Item\n    if err := dec.Decode(&item); err != nil { break }\n    process(item)\n}\n```\n\n---\n\n## 4. Graceful Shutdown\n\n```go\nfunc main() {\n    srv := &http.Server{Addr: \":8080\", Handler: mux}\n\n    // Start server in goroutine\n    go func() {\n        if err := srv.ListenAndServe(); err != http.ErrServerClosed {\n            log.Fatalf(\"server error: %v\", err)\n        }\n    }()\n\n    // Wait for interrupt signal\n    quit := make(chan os.Signal, 1)\n    signal.Notify(quit, syscall.SIGINT, syscall.SIGTERM)\n    <-quit\n\n    log.Println(\"shutting down...\")\n    ctx, cancel := context.WithTimeout(context.Background(), 30*time.Second)\n    defer cancel()\n\n    if err := srv.Shutdown(ctx); err != nil {\n        log.Fatalf(\"forced shutdown: %v\", err)\n    }\n    log.Println(\"server stopped\")\n}\n```\n\n> **Key**: `Shutdown()` stops accepting new connections, waits for in-flight requests to complete (up to context deadline).\n\n---\n\n## 5. Configuration & DI\n\n### Functional Options Pattern\n\n```go\ntype Server struct {\n    addr    string\n    timeout time.Duration\n    logger  *slog.Logger\n}\n\ntype Option func(*Server)\n\nfunc WithAddr(addr string) Option      { return func(s *Server) { s.addr = addr } }\nfunc WithTimeout(d time.Duration) Option { return func(s *Server) { s.timeout = d } }\nfunc WithLogger(l *slog.Logger) Option  { return func(s *Server) { s.logger = l } }\n\nfunc NewServer(opts ...Option) *Server {\n    s := &Server{\n        addr:    \":8080\",    // defaults\n        timeout: 30 * time.Second,\n        logger:  slog.Default(),\n    }\n    for _, opt := range opts {\n        opt(s)\n    }\n    return s\n}\n\n// Usage\nsrv := NewServer(\n    WithAddr(\":9090\"),\n    WithTimeout(10*time.Second),\n)\n```\n\n### Constructor Injection\n\n```go\ntype App struct {\n    userStore  UserStore\n    emailSvc   EmailService\n    logger     *slog.Logger\n}\n\nfunc NewApp(store UserStore, email EmailService, logger *slog.Logger) *App {\n    return &App{userStore: store, emailSvc: email, logger: logger}\n}\n```\n\n> **Go idiom**: No DI frameworks \u2014 use constructor injection + interfaces.\n\n---\n\n## 6. Profiling & Performance\n\n### pprof\n\n```go\nimport _ \"net/http/pprof\" // register pprof handlers\n\ngo func() {\n    log.Println(http.ListenAndServe(\":6060\", nil)) // debug server\n}()\n```\n\n```bash\n# CPU profile\ngo tool pprof http://localhost:6060/debug/pprof/profile?seconds=30\n\n# Heap profile\ngo tool pprof http://localhost:6060/debug/pprof/heap\n\n# Goroutine profile\ngo tool pprof http://localhost:6060/debug/pprof/goroutine\n\n# Inside pprof:\n(pprof) top 10          # top CPU consumers\n(pprof) web             # open graph in browser\n(pprof) list funcName   # source-annotated profile\n```\n\n### Escape Analysis\n\n```bash\ngo build -gcflags='-m' ./...    # show escape decisions\ngo build -gcflags='-m -m' ./... # verbose\n```\n\n```go\n// Heap escape \u2014 pointer returned\nfunc newUser() *User { return &User{} }  // escapes to heap\n\n// Stack \u2014 stays local\nfunc process() {\n    u := User{}   // stack allocated\n    validate(&u)  // may still stay on stack if validate is inlined\n}\n```\n\n### Common Performance Tips\n\n| Technique | When |\n|---|---|\n| `sync.Pool` | Reuse temporary objects (buffers, parsers) |\n| `strings.Builder` | Build strings (not `+` in loops) |\n| Pre-allocate slices | `make([]T, 0, expectedCap)` |\n| Avoid interface boxing | Hot paths \u2014 use concrete types |\n| `binary.Read/Write` | Binary protocols over JSON |\n| Struct field ordering | Align fields to reduce padding |\n\n### Struct Padding\n\n```go\n// Bad \u2014 24 bytes (padding between fields)\ntype Bad struct {\n    a bool    // 1 byte + 7 padding\n    b int64   // 8 bytes\n    c bool    // 1 byte + 7 padding\n}\n\n// Good \u2014 16 bytes (fields ordered by size desc)\ntype Good struct {\n    b int64   // 8 bytes\n    a bool    // 1 byte\n    c bool    // 1 byte + 6 padding\n}\n```\n\n---\n\n## 7. Modules & Dependencies\n\n### Key Commands\n\n```bash\ngo mod init github.com/user/project  # create module\ngo mod tidy                           # add missing, remove unused\ngo mod vendor                         # vendor dependencies\ngo mod graph                          # dependency graph\ngo list -m all                        # all dependencies\ngo list -m -versions pkg              # available versions\n```\n\n### go.mod\n\n```go\nmodule github.com/user/project\n\ngo 1.22\n\nrequire (\n    github.com/lib/pq v1.10.9\n    google.golang.org/grpc v1.62.0\n)\n\nrequire (\n    // indirect dependencies managed by go mod tidy\n    golang.org/x/net v0.21.0 // indirect\n)\n```\n\n### Versioning Rules\n\n- **v0.x.x / v1.x.x**: import as `github.com/user/pkg`\n- **v2+**: import as `github.com/user/pkg/v2` (major version suffix)\n- **replace**: `replace github.com/foo => ../local-foo` (local development)\n- **retract**: mark bad versions in go.mod\n\n### Build Tags\n\n```go\n//go:build linux && amd64\n// +build linux,amd64    // old style (pre-1.17)\n\npackage platform\n```\n\n```bash\ngo build -tags \"integration,debug\" ./...\n```\n\n---\n\n## 8. Distributed System Patterns\n\n### Retry with Exponential Backoff\n\n```go\nfunc Retry(ctx context.Context, maxAttempts int, fn func() error) error {\n    var err error\n    for i := 0; i < maxAttempts; i++ {\n        if err = fn(); err == nil {\n            return nil\n        }\n        backoff := time.Duration(1<<uint(i)) * 100 * time.Millisecond\n        select {\n        case <-ctx.Done():\n            return ctx.Err()\n        case <-time.After(backoff):\n        }\n    }\n    return fmt.Errorf(\"after %d attempts: %w\", maxAttempts, err)\n}\n```\n\n### Circuit Breaker (simplified)\n\n```go\ntype CircuitBreaker struct {\n    mu          sync.Mutex\n    failures    int\n    threshold   int\n    resetAfter  time.Duration\n    lastFailure time.Time\n    state       string // \"closed\", \"open\", \"half-open\"\n}\n\nfunc (cb *CircuitBreaker) Call(fn func() error) error {\n    cb.mu.Lock()\n    if cb.state == \"open\" {\n        if time.Since(cb.lastFailure) > cb.resetAfter {\n            cb.state = \"half-open\"\n        } else {\n            cb.mu.Unlock()\n            return ErrCircuitOpen\n        }\n    }\n    cb.mu.Unlock()\n\n    err := fn()\n\n    cb.mu.Lock()\n    defer cb.mu.Unlock()\n    if err != nil {\n        cb.failures++\n        cb.lastFailure = time.Now()\n        if cb.failures >= cb.threshold {\n            cb.state = \"open\"\n        }\n        return err\n    }\n    cb.failures = 0\n    cb.state = \"closed\"\n    return nil\n}\n```\n\n### Worker Pool with errgroup\n\n```go\nimport \"golang.org/x/sync/errgroup\"\n\nfunc ProcessItems(ctx context.Context, items []Item) error {\n    g, ctx := errgroup.WithContext(ctx)\n    g.SetLimit(10) // max 10 concurrent workers\n\n    for _, item := range items {\n        g.Go(func() error {\n            return process(ctx, item)\n        })\n    }\n    return g.Wait() // returns first error\n}\n```\n\n### Structured Logging (slog \u2014 Go 1.21+)\n\n```go\nlogger := slog.New(slog.NewJSONHandler(os.Stdout, &slog.HandlerOptions{\n    Level: slog.LevelInfo,\n}))\n\nlogger.Info(\"request handled\",\n    slog.String(\"method\", r.Method),\n    slog.String(\"path\", r.URL.Path),\n    slog.Duration(\"latency\", elapsed),\n    slog.Int(\"status\", status),\n)\n\n// With context\nlogger = logger.With(slog.String(\"service\", \"user-api\"))\n```\n\n---\n\n## Quick Reference\n\n| Pattern | Use When |\n|---|---|\n| Functional options | Configurable constructors |\n| Middleware chain | HTTP/gRPC cross-cutting concerns |\n| Graceful shutdown | Production servers |\n| Interface injection | Testability, loose coupling |\n| errgroup | Bounded concurrent work with error propagation |\n| Circuit breaker | Unreliable downstream services |\n| Retry + backoff | Transient failures |\n| slog | Structured production logging |\n\n## Interview Tips\n\n- **stdlib > frameworks**: Go culture prefers `net/http` + `http.NewServeMux` (1.22+) over Gin/Echo\n- **gRPC**: Know proto3 basics, status codes, interceptors, streaming types (unary, server, client, bidi)\n- **Graceful shutdown**: Always mention `signal.Notify` + `srv.Shutdown(ctx)` pattern\n- **pprof**: \"I'd profile with pprof \u2014 CPU, heap, goroutine profiles\" shows production experience\n- **No DI frameworks**: Constructor injection + interfaces is the Go way\n- **Functional options**: The senior-level constructor pattern \u2014 always impressive in interviews\n- **errgroup vs WaitGroup**: errgroup when you need error propagation + concurrency limits\n"}, {"id": "common_algs", "file": "common-algs.md", "title": "Algorithms", "time": "30 min", "icon": "\ud83e\uddee", "content": "# Common Algorithms in Go Cheatsheet\n\n> Essential algorithms with idiomatic Go implementations for interviews.\n\n---\n\n## Table of Contents\n1. [Sorting](#1-sorting)\n2. [Search](#2-search)\n3. [Data Structures](#3-data-structures)\n4. [Graph Algorithms](#4-graph-algorithms)\n5. [String Algorithms](#5-string-algorithms)\n6. [Dynamic Programming](#6-dynamic-programming)\n7. [LeetCode Patterns](#7-leetcode-patterns)\n\n---\n\n## 1. Sorting\n\n### Bubble Sort\n\n```go\nfunc bubbleSort(arr []int) {\n    n := len(arr)\n    for i := 0; i < n-1; i++ {\n        swapped := false\n        for j := 0; j < n-i-1; j++ {\n            if arr[j] > arr[j+1] {\n                arr[j], arr[j+1] = arr[j+1], arr[j]\n                swapped = true\n            }\n        }\n        if !swapped {\n            break  // early termination\n        }\n    }\n}\n\n// Time: O(n\u00b2) worst/average, O(n) best\n// Space: O(1)\n// Stable: Yes\n```\n\n### Insertion Sort\n\n```go\nfunc insertionSort(arr []int) {\n    for i := 1; i < len(arr); i++ {\n        key := arr[i]\n        j := i - 1\n        for j >= 0 && arr[j] > key {\n            arr[j+1] = arr[j]\n            j--\n        }\n        arr[j+1] = key\n    }\n}\n\n// Time: O(n\u00b2) worst/average, O(n) best (already sorted)\n// Space: O(1)\n// Stable: Yes\n```\n\n### Selection Sort\n\n```go\nfunc selectionSort(arr []int) {\n    for i := 0; i < len(arr)-1; i++ {\n        minIdx := i\n        for j := i + 1; j < len(arr); j++ {\n            if arr[j] < arr[minIdx] {\n                minIdx = j\n            }\n        }\n        arr[i], arr[minIdx] = arr[minIdx], arr[i]\n    }\n}\n\n// Time: O(n\u00b2) always\n// Space: O(1)\n// Stable: No\n```\n\n### Merge Sort\n\n```go\nfunc mergeSort(arr []int) []int {\n    if len(arr) <= 1 {\n        return arr\n    }\n    \n    mid := len(arr) / 2\n    left := mergeSort(arr[:mid])\n    right := mergeSort(arr[mid:])\n    \n    return merge(left, right)\n}\n\nfunc merge(left, right []int) []int {\n    result := make([]int, 0, len(left)+len(right))\n    i, j := 0, 0\n    \n    for i < len(left) && j < len(right) {\n        if left[i] <= right[j] {\n            result = append(result, left[i])\n            i++\n        } else {\n            result = append(result, right[j])\n            j++\n        }\n    }\n    \n    result = append(result, left[i:]...)\n    result = append(result, right[j:]...)\n    return result\n}\n\n// Time: O(n log n) always\n// Space: O(n)\n// Stable: Yes\n```\n\n### Quick Sort (In-Place)\n\n```go\nfunc quickSort(arr []int, low, high int) {\n    if low < high {\n        pi := partition(arr, low, high)\n        quickSort(arr, low, pi-1)\n        quickSort(arr, pi+1, high)\n    }\n}\n\nfunc partition(arr []int, low, high int) int {\n    pivot := arr[high]\n    i := low - 1\n    \n    for j := low; j < high; j++ {\n        if arr[j] < pivot {\n            i++\n            arr[i], arr[j] = arr[j], arr[i]\n        }\n    }\n    \n    arr[i+1], arr[high] = arr[high], arr[i+1]\n    return i + 1\n}\n\n// Time: O(n log n) average, O(n\u00b2) worst\n// Space: O(log n)\n// Stable: No\n```\n\n### Built-in sort Package\n\n```go\nimport \"sort\"\n\n// Ints\nsort.Ints([]int{3, 1, 2})  // ascending\nsort.Sort(sort.Reverse(sort.IntSlice(arr)))  // descending\n\n// Floats\nsort.Float64s([]float64{3.1, 1.2, 2.3})\n\n// Strings\nsort.Strings([]string{\"c\", \"a\", \"b\"})\n\n// Custom with sort.Slice\npeople := []struct{ Name string; Age int }{\n    {\"Alice\", 30}, {\"Bob\", 25},\n}\nsort.Slice(people, func(i, j int) bool {\n    return people[i].Age < people[j].Age\n})\n\n// Custom with sort.SliceStable (stable)\nsort.SliceStable(people, func(i, j int) bool {\n    return people[i].Name < people[j].Name\n})\n\n// Check sorted\nsort.IntsAreSorted(arr)  // bool\n\n// Search (requires sorted!)\nidx := sort.SearchInts(arr, 42)  // returns index, len if not found\n```\n\n### Sorting Algorithm Summary\n\n| Algorithm | Best | Average | Worst | Space | Stable |\n|-----------|------|---------|-------|-------|--------|\n| Bubble | O(n) | O(n\u00b2) | O(n\u00b2) | O(1) | Yes |\n| Insertion | O(n) | O(n\u00b2) | O(n\u00b2) | O(1) | Yes |\n| Selection | O(n\u00b2) | O(n\u00b2) | O(n\u00b2) | O(1) | No |\n| Merge | O(n log n) | O(n log n) | O(n log n) | O(n) | Yes |\n| Quick | O(n log n) | O(n log n) | O(n\u00b2) | O(log n) | No |\n\n---\n\n## 2. Search\n\n### Binary Search\n\n```go\n// Iterative\nfunc binarySearch(arr []int, target int) int {\n    low, high := 0, len(arr)-1\n    \n    for low <= high {\n        mid := low + (high-low)/2  // avoid overflow\n        if arr[mid] == target {\n            return mid\n        } else if arr[mid] < target {\n            low = mid + 1\n        } else {\n            high = mid - 1\n        }\n    }\n    return -1\n}\n\n// Recursive\nfunc binarySearchRecursive(arr []int, target, low, high int) int {\n    if low > high {\n        return -1\n    }\n    mid := low + (high-low)/2\n    if arr[mid] == target {\n        return mid\n    } else if arr[mid] < target {\n        return binarySearchRecursive(arr, target, mid+1, high)\n    }\n    return binarySearchRecursive(arr, target, low, mid-1)\n}\n\n// Time: O(log n)\n// Space: O(1) iterative, O(log n) recursive\n```\n\n### BFS (Breadth-First Search)\n\n```go\ntype Node struct {\n    Val         int\n    Neighbors   []*Node\n}\n\nfunc bfs(start *Node) []int {\n    if start == nil {\n        return nil\n    }\n    \n    visited := make(map[*Node]bool)\n    queue := []*Node{start}\n    visited[start] = true\n    result := []int{}\n    \n    for len(queue) > 0 {\n        node := queue[0]\n        queue = queue[1:]  // dequeue\n        result = append(result, node.Val)\n        \n        for _, neighbor := range node.Neighbors {\n            if !visited[neighbor] {\n                visited[neighbor] = true\n                queue = append(queue, neighbor)  // enqueue\n            }\n        }\n    }\n    return result\n}\n\n// Time: O(V + E)\n// Space: O(V)\n// Use for: shortest path (unweighted), level-order traversal\n```\n\n### DFS (Depth-First Search)\n\n```go\n// Recursive\nfunc dfsRecursive(node *Node, visited map[*Node]bool, result *[]int) {\n    if node == nil {\n        return\n    }\n    visited[node] = true\n    *result = append(*result, node.Val)\n    \n    for _, neighbor := range node.Neighbors {\n        if !visited[neighbor] {\n            dfsRecursive(neighbor, visited, result)\n        }\n    }\n}\n\n// Iterative with stack\nfunc dfsIterative(start *Node) []int {\n    if start == nil {\n        return nil\n    }\n    \n    visited := make(map[*Node]bool)\n    stack := []*Node{start}\n    result := []int{}\n    \n    for len(stack) > 0 {\n        node := stack[len(stack)-1]\n        stack = stack[:len(stack)-1]  // pop\n        \n        if visited[node] {\n            continue\n        }\n        visited[node] = true\n        result = append(result, node.Val)\n        \n        // Push in reverse for left-to-right order\n        for i := len(node.Neighbors) - 1; i >= 0; i-- {\n            if !visited[node.Neighbors[i]] {\n                stack = append(stack, node.Neighbors[i])\n            }\n        }\n    }\n    return result\n}\n\n// Time: O(V + E)\n// Space: O(V)\n// Use for: topological sort, cycle detection, path finding\n```\n\n---\n\n## 3. Data Structures\n\n### Stack (Array-Based)\n\n```go\ntype Stack struct {\n    items []int\n}\n\nfunc NewStack() *Stack {\n    return &Stack{items: []int{}}\n}\n\nfunc (s *Stack) Push(item int) {\n    s.items = append(s.items, item)\n}\n\nfunc (s *Stack) Pop() (int, bool) {\n    if len(s.items) == 0 {\n        return 0, false\n    }\n    item := s.items[len(s.items)-1]\n    s.items = s.items[:len(s.items)-1]\n    return item, true\n}\n\nfunc (s *Stack) Peek() (int, bool) {\n    if len(s.items) == 0 {\n        return 0, false\n    }\n    return s.items[len(s.items)-1], true\n}\n\nfunc (s *Stack) IsEmpty() bool {\n    return len(s.items) == 0\n}\n\n// Use: balanced parentheses, DFS, expression evaluation\n```\n\n### Queue (Slice-Based)\n\n```go\ntype Queue struct {\n    items []int\n}\n\nfunc NewQueue() *Queue {\n    return &Queue{items: []int{}}\n}\n\nfunc (q *Queue) Enqueue(item int) {\n    q.items = append(q.items, item)\n}\n\nfunc (q *Queue) Dequeue() (int, bool) {\n    if len(q.items) == 0 {\n        return 0, false\n    }\n    item := q.items[0]\n    q.items = q.items[1:]  // O(n) - consider circular buffer for O(1)\n    return item, true\n}\n\n// For O(1) operations, use two stacks:\ntype EfficientQueue struct {\n    in, out *Stack\n}\n\nfunc (q *EfficientQueue) Enqueue(item int) {\n    q.in.Push(item)\n}\n\nfunc (q *EfficientQueue) Dequeue() (int, bool) {\n    if !q.out.IsEmpty() {\n        return q.out.Pop()\n    }\n    if q.in.IsEmpty() {\n        return 0, false\n    }\n    // Transfer\n    for item, ok := q.in.Pop(); ok; item, ok = q.in.Pop() {\n        q.out.Push(item)\n    }\n    return q.out.Pop()\n}\n```\n\n### Linked List\n\n```go\ntype ListNode struct {\n    Val  int\n    Next *ListNode\n}\n\ntype LinkedList struct {\n    head *ListNode\n    size int\n}\n\nfunc (l *LinkedList) Append(val int) {\n    node := &ListNode{Val: val}\n    if l.head == nil {\n        l.head = node\n    } else {\n        cur := l.head\n        for cur.Next != nil {\n            cur = cur.Next\n        }\n        cur.Next = node\n    }\n    l.size++\n}\n\nfunc (l *LinkedList) Remove(val int) bool {\n    if l.head == nil {\n        return false\n    }\n    if l.head.Val == val {\n        l.head = l.head.Next\n        l.size--\n        return true\n    }\n    cur := l.head\n    for cur.Next != nil && cur.Next.Val != val {\n        cur = cur.Next\n    }\n    if cur.Next == nil {\n        return false\n    }\n    cur.Next = cur.Next.Next\n    l.size--\n    return true\n}\n\n// Reverse\nfunc reverseList(head *ListNode) *ListNode {\n    var prev *ListNode\n    cur := head\n    for cur != nil {\n        next := cur.Next\n        cur.Next = prev\n        prev = cur\n        cur = next\n    }\n    return prev\n}\n```\n\n### Hash Map (Simplified)\n\n```go\ntype HashMap struct {\n    buckets []*bucket  // array of linked lists\n    size    int\n    capacity int\n}\n\ntype entry struct {\n    key   string\n    value any\n    next  *entry\n}\n\ntype bucket struct {\n    head *entry\n}\n\nfunc NewHashMap(capacity int) *HashMap {\n    buckets := make([]*bucket, capacity)\n    for i := range buckets {\n        buckets[i] = &bucket{}\n    }\n    return &HashMap{\n        buckets:  buckets,\n        capacity: capacity,\n    }\n}\n\nfunc (h *HashMap) hash(key string) int {\n    hash := 0\n    for _, c := range key {\n        hash = hash*31 + int(c)\n    }\n    return hash % h.capacity\n}\n\nfunc (h *HashMap) Set(key string, value any) {\n    idx := h.hash(key)\n    b := h.buckets[idx]\n    \n    // Update existing\n    for e := b.head; e != nil; e = e.next {\n        if e.key == key {\n            e.value = value\n            return\n        }\n    }\n    \n    // Add new\n    h.buckets[idx].head = &entry{key: key, value: value, next: b.head}\n    h.size++\n}\n\nfunc (h *HashMap) Get(key string) (any, bool) {\n    idx := h.hash(key)\n    for e := h.buckets[idx].head; e != nil; e = e.next {\n        if e.key == key {\n            return e.value, true\n        }\n    }\n    return nil, false\n}\n```\n\n---\n\n## 4. Graph Algorithms\n\n### Topological Sort (Kahn's Algorithm)\n\n```go\nfunc topologicalSort(n int, edges [][]int) ([]int, bool) {\n    // Build adjacency list and in-degree\n    graph := make([][]int, n)\n    inDegree := make([]int, n)\n    \n    for _, edge := range edges {\n        from, to := edge[0], edge[1]\n        graph[from] = append(graph[from], to)\n        inDegree[to]++\n    }\n    \n    // Start with nodes that have no dependencies\n    queue := []int{}\n    for i := 0; i < n; i++ {\n        if inDegree[i] == 0 {\n            queue = append(queue, i)\n        }\n    }\n    \n    result := []int{}\n    for len(queue) > 0 {\n        node := queue[0]\n        queue = queue[1:]\n        result = append(result, node)\n        \n        for _, neighbor := range graph[node] {\n            inDegree[neighbor]--\n            if inDegree[neighbor] == 0 {\n                queue = append(queue, neighbor)\n            }\n        }\n    }\n    \n    // Check for cycle\n    if len(result) != n {\n        return nil, false  // cycle detected\n    }\n    return result, true\n}\n\n// Use: build systems, course scheduling, dependency resolution\n```\n\n### Dijkstra's Shortest Path\n\n```go\nfunc dijkstra(graph map[string][][2]string, start string) map[string]int {\n    dist := map[string]int{}\n    for k := range graph {\n        dist[k] = math.MaxInt\n    }\n    dist[start] = 0\n    \n    // Min-heap priority queue\n    pq := &PriorityQueue{}\n    heap.Init(pq)\n    heap.Push(pq, &Item{node: start, dist: 0})\n    \n    for pq.Len() > 0 {\n        item := heap.Pop(pq).(*Item)\n        if item.dist > dist[item.node] {\n            continue\n        }\n        \n        for _, edge := range graph[item.node] {\n            neighbor := edge[0]\n            weight := edge[1]\n            newDist := dist[item.node] + weight\n            \n            if newDist < dist[neighbor] {\n                dist[neighbor] = newDist\n                heap.Push(pq, &Item{node: neighbor, dist: newDist})\n            }\n        }\n    }\n    return dist\n}\n\n// Use: shortest path with non-negative weights\n```\n\n### Union-Find (Disjoint Set)\n\n```go\ntype UnionFind struct {\n    parent []int\n    rank   []int\n}\n\nfunc NewUnionFind(n int) *UnionFind {\n    parent := make([]int, n)\n    rank := make([]int, n)\n    for i := range parent {\n        parent[i] = i\n    }\n    return &UnionFind{parent, rank}\n}\n\nfunc (uf *UnionFind) Find(x int) int {\n    if uf.parent[x] != x {\n        uf.parent[x] = uf.Find(uf.parent[x])  // path compression\n    }\n    return uf.parent[x]\n}\n\nfunc (uf *UnionFind) Union(x, y int) bool {\n    px, py := uf.Find(x), uf.Find(y)\n    if px == py {\n        return false  // already connected\n    }\n    \n    // Union by rank\n    if uf.rank[px] < uf.rank[py] {\n        px, py = py, px\n    }\n    uf.parent[py] = px\n    if uf.rank[px] == uf.rank[py] {\n        uf.rank[px]++\n    }\n    return true\n}\n\n// Use: Kruskal's MST, cycle detection, connected components\n```\n\n---\n\n## 5. String Algorithms\n\n### Anagram Check\n\n```go\nfunc isAnagram(s1, s2 string) bool {\n    if len(s1) != len(s2) {\n        return false\n    }\n    \n    count := make(map[rune]int)\n    for _, c := range s1 {\n        count[c]++\n    }\n    for _, c := range s2 {\n        count[c]--\n        if count[c] < 0 {\n            return false\n        }\n    }\n    return true\n}\n\n// Time: O(n)\n// Space: O(k) where k = unique characters\n```\n\n### Palindrome Check\n\n```go\nfunc isPalindrome(s string) bool {\n    // Two pointers\n    left, right := 0, len(s)-1\n    for left < right {\n        if s[left] != s[right] {\n            return false\n        }\n        left++\n        right--\n    }\n    return true\n}\n\n// For alphanumeric only\nfunc isPalindromeAlphanumeric(s string) bool {\n    s = strings.ToLower(s)\n    left, right := 0, len(s)-1\n    \n    for left < right {\n        // Skip non-alphanumeric\n        for left < right && !isAlphanumeric(s[left]) {\n            left++\n        }\n        for left < right && !isAlphanumeric(s[right]) {\n            right--\n        }\n        if left < right && s[left] != s[right] {\n            return false\n        }\n        left++\n        right--\n    }\n    return true\n}\n```\n\n### Substring Search (KMP Basics)\n\n```go\nfunc strStr(haystack, needle string) int {\n    if needle == \"\" {\n        return 0\n    }\n    \n    // Build LPS (Longest Proper Prefix Suffix) array\n    lps := make([]int, len(needle))\n    for i := 1; i < len(needle); i++ {\n        j := lps[i-1]\n        for j > 0 && needle[i] != needle[j] {\n            j = lps[j-1]\n        }\n        if needle[i] == needle[j] {\n            j++\n        }\n        lps[i] = j\n    }\n    \n    // Search\n    j := 0\n    for i := 0; i < len(haystack); i++ {\n        for j > 0 && haystack[i] != needle[j] {\n            j = lps[j-1]\n        }\n        if haystack[i] == needle[j] {\n            j++\n        }\n        if j == len(needle) {\n            return i - len(needle) + 1\n        }\n    }\n    return -1\n}\n\n// Time: O(n + m)\n// Space: O(m)\n```\n\n---\n\n## 6. Dynamic Programming\n\n### Fibonacci (Memoization)\n\n```go\n// Top-down with memoization\nfunc fibMemo(n int) int {\n    memo := make([]int, n+1)\n    return fibHelper(n, memo)\n}\n\nfunc fibHelper(n int, memo []int) int {\n    if n <= 1 {\n        return n\n    }\n    if memo[n] != 0 {\n        return memo[n]\n    }\n    memo[n] = fibHelper(n-1, memo) + fibHelper(n-2, memo)\n    return memo[n]\n}\n\n// Bottom-up DP\nfunc fibDP(n int) int {\n    if n <= 1 {\n        return n\n    }\n    dp := make([]int, n+1)\n    dp[0], dp[1] = 0, 1\n    for i := 2; i <= n; i++ {\n        dp[i] = dp[i-1] + dp[i-2]\n    }\n    return dp[n]\n}\n\n// Space-optimized\nfunc fibOptimized(n int) int {\n    if n <= 1 {\n        return n\n    }\n    prev, curr := 0, 1\n    for i := 2; i <= n; i++ {\n        prev, curr = curr, prev+curr\n    }\n    return curr\n}\n\n// Time: O(n)\n// Space: O(n) or O(1) optimized\n```\n\n### Longest Common Subsequence (LCS)\n\n```go\nfunc longestCommonSubseq(s1, s2 string) int {\n    m, n := len(s1), len(s2)\n    dp := make([][]int, m+1)\n    for i := range dp {\n        dp[i] = make([]int, n+1)\n    }\n    \n    for i := 1; i <= m; i++ {\n        for j := 1; j <= n; j++ {\n            if s1[i-1] == s2[j-1] {\n                dp[i][j] = dp[i-1][j-1] + 1\n            } else {\n                dp[i][j] = max(dp[i-1][j], dp[i][j-1])\n            }\n        }\n    }\n    return dp[m][n]\n}\n\n// Time: O(m * n)\n// Space: O(m * n) or O(min(m, n)) optimized\n```\n\n### 0/1 Knapsack\n\n```go\nfunc knapsack(weights, values []int, capacity int) int {\n    n := len(weights)\n    dp := make([][]int, n+1)\n    for i := range dp {\n        dp[i] = make([]int, capacity+1)\n    }\n    \n    for i := 1; i <= n; i++ {\n        for w := 0; w <= capacity; w++ {\n            // Don't include item i-1\n            dp[i][w] = dp[i-1][w]\n            \n            // Include item i-1 if it fits\n            if w >= weights[i-1] {\n                dp[i][w] = max(dp[i][w], dp[i-1][w-weights[i-1]]+values[i-1])\n            }\n        }\n    }\n    return dp[n][capacity]\n}\n\n// Space-optimized (1D)\nfunc knapsackOptimized(weights, values []int, capacity int) int {\n    dp := make([]int, capacity+1)\n    \n    for i := 0; i < len(weights); i++ {\n        // Iterate backwards to avoid reuse\n        for w := capacity; w >= weights[i]; w-- {\n            dp[w] = max(dp[w], dp[w-weights[i]]+values[i])\n        }\n    }\n    return dp[capacity]\n}\n\n// Time: O(n * capacity)\n// Space: O(capacity)\n```\n\n---\n\n## 7. LeetCode Patterns\n\n### Two Pointers\n\n```go\n// Remove duplicates from sorted array\nfunc removeDuplicates(nums []int) int {\n    if len(nums) == 0 {\n        return 0\n    }\n    slow := 0\n    for fast := 1; fast < len(nums); fast++ {\n        if nums[fast] != nums[slow] {\n            slow++\n            nums[slow] = nums[fast]\n        }\n    }\n    return slow + 1\n}\n\n// Container with most water\nfunc maxArea(height []int) int {\n    left, right := 0, len(height)-1\n    maxWater := 0\n    \n    for left < right {\n        width := right - left\n        h := min(height[left], height[right])\n        maxWater = max(maxWater, width*h)\n        \n        if height[left] < height[right] {\n            left++\n        } else {\n            right--\n        }\n    }\n    return maxWater\n}\n```\n\n### Sliding Window\n\n```go\n// Longest substring without repeating characters\nfunc lengthOfLongestSubstring(s string) int {\n    charIndex := make(map[byte]int)\n    maxLen := 0\n    left := 0\n    \n    for right := 0; right < len(s); right++ {\n        if idx, exists := charIndex[s[right]]; exists && idx >= left {\n            left = idx + 1\n        }\n        charIndex[s[right]] = right\n        maxLen = max(maxLen, right-left+1)\n    }\n    return maxLen\n}\n\n// Maximum sum subarray (Kadane's algorithm)\nfunc maxSubArray(nums []int) int {\n    maxSum := nums[0]\n    currentSum := nums[0]\n    \n    for i := 1; i < len(nums); i++ {\n        currentSum = max(nums[i], currentSum+nums[i])\n        maxSum = max(maxSum, currentSum)\n    }\n    return maxSum\n}\n```\n\n### Fast & Slow Pointers (Cycle Detection)\n\n```go\nfunc hasCycle(head *ListNode) bool {\n    if head == nil {\n        return false\n    }\n    \n    slow, fast := head, head\n    \n    for fast != nil && fast.Next != nil {\n        slow = slow.Next\n        fast = fast.Next.Next\n        \n        if slow == fast {\n            return true\n        }\n    }\n    return false\n}\n\n// Find middle of linked list\nfunc middleNode(head *ListNode) *ListNode {\n    slow, fast := head, head\n    \n    for fast != nil && fast.Next != nil {\n        slow = slow.Next\n        fast = fast.Next.Next\n    }\n    return slow\n}\n\n// Linked list cycle start\nfunc detectCycleStart(head *ListNode) *ListNode {\n    if hasCycle(head) {\n        slow, fast := head, head\n        for fast != nil && fast.Next != nil {\n            slow = slow.Next\n            fast = fast.Next.Next\n            if slow == fast {\n                // Find cycle start\n                slow = head\n                for slow != fast {\n                    slow = slow.Next\n                    fast = fast.Next\n                }\n                return slow\n            }\n        }\n    }\n    return nil\n}\n```\n\n---\n\n## Quick Reference\n\n| Pattern | Use Case | Key Technique |\n|---------|----------|---------------|\n| Two Pointers | Sorted arrays, pair finding | Start/end or fast/slow |\n| Sliding Window | Subarrays, substrings | Expand/contract window |\n| Fast & Slow | Cycle detection, middle | hare/tortoise |\n| Merge Intervals | Overlap, scheduling | Sort + iterate |\n| Top K | Largest/smallest elements | Heap or quickselect |\n| DP | Optimization with subproblems | Memoize or tabulate |\n| Backtracking | Generate all solutions | Recurse + prune |\n\n---\n\n## Complexity Cheat Sheet\n\n| Structure/Algo | Time (avg) | Space |\n|----------------|------------|-------|\n| Array access | O(1) | - |\n| Array search | O(n) | - |\n| HashMap | O(1) | O(n) |\n| BST | O(log n) | - |\n| Stack/Queue | O(1) push/pop | - |\n| Sorting | O(n log n) | varies |\n| BFS/DFS | O(V+E) | O(V) |\n| Dijkstra | O(E log V) | O(V) |\n| LCS | O(m\u00d7n) | O(m\u00d7n) |\n\n---\n\n## Interview Tips\n\n1. **Start brute force** \u2014 optimize later if asked\n2. **Use maps for O(1) lookups** \u2014 very Go-idiomatic\n3. **Explain complexity** \u2014 always mention time and space\n4. **Edge cases** \u2014 empty input, single element, duplicates\n5. **Prefer built-in** \u2014 `sort.Ints`, `sort.Slice`, `container/heap`\n"}, {"id": "golang_qa", "file": "golang-qa.md", "title": "Q&A Practice", "time": "15 min", "icon": "\u2753", "content": "# Go Programming Q&A Study Materials\n\nBased on \"Get Programming with Go\", \"Go in Action\", \"Go in Practice\", and related resources.\n\n---\n\n## Unit 1: Getting Started & Imperative Programming\n\n**Q1: What is the entry point of a Go program?**\nA: The `main()` function in the `main` package. When you run a Go program, execution begins at `main()`.\n\n**Q2: What does the `package main` declaration signify?**\nA: It declares that this file belongs to the `main` package, which is required for executable programs.\n\n**Q3: What is the purpose of the `import` statement in Go?**\nA: It makes external packages available for use. The `fmt` package, for example, provides formatted I/O functions like `Println` and `Printf`.\n\n**Q4: What is the difference between `Print`, `Println`, and `Printf`?**\nA: `Print` outputs values without adding newlines. `Println` adds a newline after output. `Printf` uses format verbs (like `%v`) for formatted output with control over spacing and alignment.\n\n**Q5: How do you declare a constant in Go?**\nA: Using the `const` keyword: `const lightSpeed = 299792 // km/s`\n\n**Q6: How do you declare a variable in Go?**\nA: Using the `var` keyword: `var distance = 56000000 // km`\n\n**Q7: What happens if you try to assign a new value to a constant?**\nA: The Go compiler reports an error: \"cannot assign to [constant name]\"\n\n**Q8: What are the arithmetic operators available in Go?**\nA: `+` (addition), `-` (subtraction), `*` (multiplication), `/` (division), `%` (modulus/remainder)\n\n**Q9: What is the modulus operator `%` used for?**\nA: It returns the remainder of integer division. For example, `42 % 10` equals `2`.\n\n**Q10: How do you generate a random number in Go?**\nA: Use the `math/rand` package with `rand.Intn(n)` which returns a number from 0 to n-1.\n\n**Q11: What is an off-by-one error?**\nA: An error where you count one item too many or too few. For example, `rand.Intn(10)` returns 0-9, not 1-10.\n\n---\n\n## Unit 2: Types\n\n**Q12: What are the two main numeric types in Go?**\nA: Integer types (whole numbers like `int`, `int8`, `int16`, `int32`, `int64`, `uint`) and floating-point types (decimal numbers like `float32`, `float64`).\n\n**Q13: What is the difference between `int` and `float64`?**\nA: `int` represents whole numbers without decimal places. `float64` represents numbers with decimal places (floating-point precision).\n\n**Q14: How do you convert an integer to a float in Go?**\nA: Use type conversion: `float64(myInt)` or `float32(myInt)`\n\n**Q15: What is the zero value of numeric types in Go?**\nA: `0` for integers and floats.\n\n**Q16: How do you declare a string in Go?**\nA: Using double quotes: `\"Hello, World!\"` or backticks for raw strings: `` `Hello, \\n World` ``\n\n**Q17: What is the zero value of a string in Go?**\nA: An empty string: `\"\"`\n\n**Q18: How do you get the length of a string in Go?**\nA: Use the `len()` function: `len(\"Hello\")` returns `5`\n\n---\n\n## Unit 3: Loops and Branches\n\n**Q19: What is the only loop construct in Go?**\nA: The `for` loop. Go doesn't have `while` or `do-while` loops, just `for`.\n\n**Q20: How do you write an infinite loop in Go?**\nA: `for { // code }` or `for ;; { // code }`\n\n**Q21: What is the syntax for a `for` loop with initialization, condition, and post?**\nA: `for i := 0; i < 10; i++ { // code }`\n\n**Q22: How do you write a `while` loop equivalent in Go?**\nA: `for condition { // code }` (no init or post statements)\n\n**Q23: What are the Boolean operators in Go?**\nA: `&&` (AND), `||` (OR), `!` (NOT)\n\n**Q24: How do you write an `if` statement in Go?**\nA: `if condition { // code }` or `if condition { // code } else { // code }`\n\n**Q25: Can you have a variable declaration in an `if` statement?**\nA: Yes: `if x := 10; x > 5 { // x is scoped to the if block }`\n\n**Q26: How does a `switch` statement work in Go?**\nA: It matches a value against cases. Unlike C, Go's switch doesn't fall through by default (use `fallthrough` to explicitly fall through).\n\n**Q27: What is the purpose of `break` in a switch?**\nA: In Go switches, `break` is automatic. If you want to continue to the next case, you use `fallthrough`.\n\n---\n\n## Unit 4: Functions\n\n**Q28: How do you declare a function in Go?**\nA: `func functionName(parameters) returnType { // body }`\n\n**Q29: Can a function return multiple values?**\nA: Yes! This is a key Go feature. Example: `func divide(a, b float64) (float64, error)`\n\n**Q30: What are named return values in Go?**\nA: You can name return values in the function signature: `func add(a, b int) (sum int) { sum = a + b; return }`\n\n**Q31: What is a variadic function?**\nA: A function that accepts a variable number of arguments using `...`: `func sum(nums ...int) int`\n\n**Q32: How do you pass a function as an argument to another function?**\nA: Functions are first-class in Go: `func operate(fn func(int, int) int, a, b int) int`\n\n---\n\n## Unit 5: Collections\n\n**Q33: What is the difference between an array and a slice in Go?**\nA: Arrays have fixed length, slices are dynamic views into arrays. Slices are more commonly used.\n\n**Q34: How do you create a slice in Go?**\nA: `[]int{1, 2, 3}` or `make([]int, 10)` or `make([]int, 0, 10)`\n\n**Q35: What is the `append` function used for?**\nA: To add elements to a slice: `slice = append(slice, element)`\n\n**Q36: How do you create a map in Go?**\nA: `make(map[keyType]valueType)` or `map[keyType]valueType{key: value}`\n\n**Q37: How do you check if a key exists in a map?**\nA: `value, exists := myMap[key]` - `exists` is `true` if the key was found.\n\n**Q38: How do you delete an entry from a map?**\nA: `delete(myMap, key)`\n\n---\n\n## Unit 6: Structs and Methods\n\n**Q39: How do you define a struct in Go?**\nA: `type Person struct { Name string; Age int }`\n\n**Q40: How do you create an instance of a struct?**\nA: `p := Person{Name: \"Alice\", Age: 30}` or `p := Person{}` with zero values\n\n**Q41: What is a method in Go?**\nA: A function attached to a type using a receiver: `func (p Person) Greet() string { return \"Hello, \" + p.Name }`\n\n**Q42: What is the difference between value receiver and pointer receiver methods?**\nA: Value receiver: `(p Person)` - operates on a copy. Pointer receiver: `(p *Person)` - operates on the original.\n\n**Q43: What is struct embedding/composition in Go?**\nA: Embedding one struct inside another: `type Employee struct { Person }` - allows promoted methods and fields.\n\n---\n\n## Unit 7: Interfaces\n\n**Q44: What is an interface in Go?**\nA: A type that specifies a set of method signatures. Any type implementing those methods satisfies the interface.\n\n**Q45: How do you define an interface?**\nA: `type Reader interface { Read(p []byte) (n int, err error) }`\n\n**Q46: What is the empty interface `interface{}`?**\nA: A type that has no methods, so any type satisfies it. Used for heterogeneous collections.\n\n**Q47: What is a type assertion in Go?**\nA: Extracting the concrete type from an interface: `value, ok := myInterface.(ConcreteType)`\n\n**Q48: What is the comma-ok idiom?**\nA: Checking if a type assertion or map key lookup succeeded: `value, ok := x.(T)` where `ok` is true if successful.\n\n---\n\n## Unit 8: Pointers\n\n**Q49: What is a pointer in Go?**\nA: A variable that holds the memory address of another variable, not the value itself.\n\n**Q50: How do you get the address of a variable?**\nA: Using the `&` operator: `ptr := &variable`\n\n**Q51: How do you dereference a pointer?**\nA: Using the `*` operator: `value := *ptr`\n\n**Q52: What is the zero value of a pointer?**\nA: `nil`\n\n**Q53: What is the difference between passing a value vs a pointer to a function?**\nA: Passing a value copies the data. Passing a pointer shares the original data, allowing mutation.\n\n**Q54: Why might you use pointers instead of values?**\nA: To modify the original data, avoid copying large structs, or represent optional values (nil).\n\n---\n\n## Unit 9: Goroutines and Concurrency\n\n**Q55: What is a goroutine?**\nA: A lightweight thread managed by the Go runtime. Start with `go functionCall()`.\n\n**Q56: How do you start a goroutine?**\nA: Prefix a function call with `go`: `go doWork()`\n\n**Q57: What are channels in Go?**\nA: Typed conduits for communicating between goroutines. Created with `make(chan Type)`.\n\n**Q58: How do you send and receive values on a channel?**\nA: Send: `ch <- value`. Receive: `value := <-ch`\n\n**Q59: What is an unbuffered channel?**\nA: A channel with no capacity. Send and receive must happen simultaneously (synchronous).\n\n**Q60: What is a buffered channel?**\nA: A channel with capacity: `make(chan int, 10)`. Sends block only when full, receives when empty.\n\n**Q61: What does the `select` statement do?**\nA: Multiplexes over multiple channel operations, similar to a `switch` but for channels.\n\n**Q62: What is a `sync.WaitGroup` used for?**\nA: To wait for a collection of goroutines to finish. Add counters with `Add()`, wait with `Wait()`, signal completion with `Done()`.\n\n**Q63: How do you prevent a goroutine leak?**\nA: Ensure goroutines have a way to exit (close channels, use context cancellation, use `sync.WaitGroup`).\n\n---\n\n## Unit 10: Error Handling\n\n**Q64: How does Go handle errors?**\nA: Errors are values - functions return an `error` type that callers check.\n\n**Q65: How do you create an error?**\nA: `errors.New(\"message\")` or `fmt.Errorf(\"formatted %s\", arg)`\n\n**Q66: How do you check for errors?**\nA: `if err != nil { // handle error }`\n\n**Q67: What is the idiomatic way to handle errors in Go?**\nA: Return errors as values. Don't use exceptions. Handle errors at the call site or propagate up.\n\n**Q68: What is the `defer` keyword used for?**\nA: Schedules a function to run after the surrounding function returns, commonly for cleanup.\n\n**Q69: In what order do deferred functions execute?**\nA: LIFO (Last In, First Out) - the last deferred function runs first.\n\n---\n\n## Unit 11: Packages and Testing\n\n**Q70: How do you import a package in Go?**\nA: `import \"package/name\"` or grouped: `import ( \"fmt\" \"os\" )`\n\n**Q71: What is the `init()` function?**\nA: A special function that runs before `main()`, used for package initialization.\n\n**Q72: How do you write a test in Go?**\nA: Create a file ending in `_test.go` and use the `testing` package. Functions start with `Test`.\n\n**Q73: What is the signature of a test function?**\nA: `func TestName(t *testing.T)`\n\n**Q74: How do you run tests?**\nA: `go test ./...` for all tests in the package.\n\n**Q75: What is `t.Fatal` used for?**\nA: To stop a test immediately and log a fatal error.\n\n---\n\n## Advanced Topics\n\n**Q76: What is `context.Context` used for?**\nA: To carry deadlines, cancellation signals, and request-scoped values across API boundaries.\n\n**Q77: How do you create a goroutine-safe counter?**\nA: Use `sync.Mutex` or `sync/atomic` operations.\n\n**Q78: What is `sync.Mutex`?**\nA: A mutual exclusion lock that protects shared data from concurrent access.\n\n**Q79: What is `io.Reader` and `io.Writer`?**\nA: Fundamental interfaces for streaming data. `Reader` has `Read([]byte)`, `Writer` has `Write([]byte)`.\n\n**Q80: How do you read all content from an `io.Reader`?**\nA: `io.ReadAll(reader)` or `ioutil.ReadAll(reader)`\n\n**Q81: What is the `net/http` package used for?**\nA: Building HTTP clients and servers. `http.ListenAndServe()` for servers.\n\n**Q82: How do you encode/decode JSON in Go?**\nA: Use `encoding/json` package with `json.Marshal()` and `json.Unmarshal()`.\n\n**Q83: What struct tags are used for JSON?**\nA: `json:\"fieldname\"` for naming, `json:\"-\"` to omit, `json:\",omitempty\"` for empty omission.\n\n**Q84: What is `encoding/gob` used for?**\nA: Go's own binary encoding protocol for Go-specific data serialization.\n\n**Q85: How do you implement a custom JSON marshaler?**\nA: Implement `MarshalJSON() ([]byte, error)` method on your type.\n\n**Q86: What is `time.Duration`?**\nA: A type representing an elapsed time, often created with `time.Second`, `time.Millisecond`, etc.\n\n**Q87: How do you measure execution time?**\nA: `start := time.Now(); // code; elapsed := time.Since(start)`\n\n**Q88: What is the `bufio` package used for?**\nA: Buffered I/O operations, providing `Scanner`, `Reader`, and `Writer` types.\n\n**Q89: How do you format a time value?**\nA: `time.Now().Format(\"2006-01-02 15:04:05\")` - reference time is Mon Jan 2 15:04:05 MST 2006.\n\n**Q90: What is a goroutine's stack size?**\nA: Starts at 2KB (vs ~1MB for OS threads), grows as needed.\n\n**Q91: How many goroutines can typically run on one machine?**\nA: Hundreds of thousands, thanks to the small stack size.\n\n**Q92: What is `go mod init` used for?**\nA: Initialize a new module, creating `go.mod` file.\n\n**Q93: What is `go mod tidy` used for?**\nA: Add missing and remove unused modules.\n\n**Q94: What is the purpose of `go build`?**\nA: Compile the package and its dependencies into an executable.\n\n**Q95: What is the difference between `go build` and `go install`?**\nA: `go build` compiles to current directory. `go install` compiles and places binary in `$GOPATH/bin`.\n\n**Q96: How do you handle panics in Go?**\nA: Use `defer` with `recover()` to catch panics: `defer func() { if r := recover(); r != nil { /* handle */ } }()`\n\n**Q97: When should you use panic vs error?**\nA: Use errors for recoverable situations. Use panic only for truly unrecoverable states.\n\n**Q98: What is `runtime.GOMAXPROCS`?**\nA: Sets the maximum number of CPUs that can execute simultaneously.\n\n**Q99: How do you create a worker pool pattern in Go?**\nA: Create a fixed number of goroutines, feed them work through channels.\n\n**Q100: What is the go routine leak problem?**\nA: Goroutines that block forever (e.g., waiting on a channel that never receives), causing memory to grow unbounded.\n\n---\n\n## Unit 12: Slices Deep Dive\n\n**Q101: What is the internal structure of a slice?**\nA: A slice has three components: a pointer to the underlying array, a length (number of elements), and a capacity (max size before reallocation).\n\n**Q102: What happens when you append beyond a slice's capacity?**\nA: Go allocates a new larger array (typically 2x the old capacity), copies existing elements, and appends the new ones.\n\n**Q103: How do you create a nil slice vs an empty slice?**\nA: `var s []int` creates a nil slice. `s := []int{}` or `s := make([]int, 0)` creates an empty slice with no elements but non-nil.\n\n**Q104: What is the difference between `nil` and an empty slice?**\nA: A nil slice has zero length, zero capacity, and no underlying array. An empty slice has zero length but may have an allocated underlying array.\n\n**Q105: How do you copy a slice in Go?**\nA: Use `copy(dst, src)` which returns the number of elements copied. Or use `append` with a new slice.\n\n**Q106: What is `append` with three arguments used for?**\nA: `append(slice, elems...)[:n]` to append limited elements: `append(s[:0], otherSlice[:2]...)`.\n\n**Q107: How do you create a slice with make for a specific length and capacity?**\nA: `make([]int, 10)` creates length 10 (zeroed), capacity 10. `make([]int, 0, 10)` creates length 0, capacity 10.\n\n**Q108: What does `s[:0]` achieve in slice operations?**\nA: Returns a slice with length 0 but same backing array and capacity\u2014useful for safe in-place operations.\n\n**Q109: How do you remove an element from the middle of a slice?**\nA: `append(s[:i], s[i+1:]...)` removes element at index i by shifting subsequent elements left.\n\n**Q110: What is a two-dimensional slice in Go?**\nA: A slice of slices: `[][]int{{1,2}, {3,4}}`. Inner slices can have different lengths.\n\n---\n\n## Unit 13: Maps Deep Dive\n\n**Q111: What is the internal structure of a Go map?**\nA: A map is a hash table with buckets. Each bucket holds up to 8 key/value pairs with overflow buckets for collision handling.\n\n**Q112: What happens when you write to a map during iteration?**\nA: It can cause unpredictable behavior. Never modify a map while iterating over it with a `range` loop.\n\n**Q113: What is a nil map vs an empty map?**\nA: A nil map (`var m map[string]int`) cannot be written to (panics). An empty map (`m := make(map[string]int)`) can be written to.\n\n**Q114: How do you iterate over a map in Go?**\nA: `for k, v := range myMap { ... }` - order is randomized each iteration.\n\n**Q115: What is map growth behavior in Go?**\nA: Maps grow by doubling bucket count when load factor exceeds ~6.5. Empty buckets are kept for eventual reuse.\n\n**Q116: How do you sort a map's keys before iteration?**\nA: Extract keys to a slice, sort the slice, then iterate: `keys := make([]string, 0, len(m)); for k := range m { keys = append(keys, k) }; sort.Strings(keys)`\n\n**Q117: What is the zero value of a map?**\nA: `nil` - a nil map has no keys and cannot be written to.\n\n**Q118: What is map's capacity hint when using make?**\nA: `make(map[K]V, hint)` gives the runtime a hint about expected number of entries to optimize initial allocation.\n\n---\n\n## Unit 14: Strings and Runes\n\n**Q119: What is the difference between a string and a byte slice in Go?**\nA: A string is immutable, stored as bytes with length. A byte slice (`[]byte`) is mutable and can be modified in place.\n\n**Q120: What is a rune in Go?**\nA: A rune is an alias for `int32`, representing a Unicode code point. Used for iterating over characters.\n\n**Q121: How do you iterate over runes in a string?**\nA: `for i, r := range str { ... }` - `r` is the Unicode code point, `i` is the byte index.\n\n**Q122: How do you convert a string to bytes and back?**\nA: `[]byte(str)` converts to bytes. `string(bytes)` converts back to string.\n\n**Q123: What is the UTF-8 encoding property in Go strings?**\nA: Go strings are UTF-8 by default. ASCII characters are single bytes; runes may take 1-4 bytes.\n\n**Q124: How do you get the number of runes (characters) in a string?**\nA: Use `utf8.RuneCountInString(s)` or iterate with `for range` counting runes.\n\n**Q125: What does `len(str)` return for a multi-byte UTF-8 string?**\nA: The number of bytes, not characters. \"hello\" returns 5, \"h\u00e9llo\" returns 6.\n\n**Q126: How do you access a character at a specific position?**\nA: Convert to runes first: `runes := []rune(str); ch := runes[n]`\n\n**Q127: What is `strings.Builder` used for?**\nA: Efficiently builds strings with `Write`, `WriteString`, `WriteByte`, and `String()` methods.\n\n**Q128: How do you trim whitespace from a string?**\nA: `strings.TrimSpace(s)`, `strings.Trim(s, cutset)`, `strings.TrimLeft(s, cutset)`, `strings.TrimRight(s, cutset)`.\n\n**Q129: What does `strings.Split` vs `strings.SplitN` return?**\nA: `Split` returns all substrings. `SplitN` limits the number of splits, with the last element containing the remainder.\n\n**Q130: How do you concatenate strings efficiently?**\nA: Use `strings.Builder` or `strings.Join()` for multiple strings. Use `+` for short, fixed concatenations.\n\n---\n\n## Unit 15: Defer, Panic, Recover\n\n**Q131: When exactly does a deferred function execute?**\nA: Immediately after the surrounding function returns, even if it panics or uses `return` with named return values.\n\n**Q132: What happens to deferred functions during a panic?**\nA: They still execute in LIFO order as the panic propagates up the call stack.\n\n**Q133: How do you use recover to catch a panic?**\nA: Place `recover()` in a deferred function: `defer func() { if p := recover(); p != nil { /* handle */ } }()`\n\n**Q134: What is the difference between panic and error?**\nA: Panic is for truly unrecoverable situations (nil dereference, out of bounds). Errors are for expected failure cases.\n\n**Q135: Can deferred functions access named return values?**\nA: Yes, they can modify named return values before they are returned to the caller.\n\n**Q136: What is the output order of: `fmt.Print(\"A\"); defer fmt.Print(\"B\"); fmt.Print(\"C\")`?**\nA: ACB - \"A\" prints, then \"C\", then deferred \"B\" prints last.\n\n**Q137: What happens if recover is called outside a deferred function?**\nA: It returns `nil` and has no effect.\n\n**Q138: How do you re-panic after catching with recover?**\nA: Call `panic(p)` again with the recovered value: `recover()` returns the panic value which you can re-panic.\n\n---\n\n## Unit 16: Interfaces Deep Dive\n\n**Q139: What is the empty interface interface{}?**\nA: An interface with zero methods that every type satisfies. Useful for heterogeneous collections: `[]interface{}`.\n\n**Q140: What is a type switch?**\nA: A switch that compares the concrete type of an interface: `switch v.(type)` or `switch v := x.(type)`.\n\n**Q141: What is the difference between interface{} and any?**\nA: `any` is an alias for `interface{}` introduced in Go 1.18. They are identical.\n\n**Q142: What makes Go interfaces so efficient?**\nA: Interfaces are two-word structures: type pointer and data pointer. No method table lookup unless needed.\n\n**Q143: What is interface pollution?**\nA: Having too many small interfaces that complicate type relationships. Prefer fewer, focused interfaces.\n\n**Q144: What is the io.ReaderAt interface?**\nA: `ReadAt(p []byte, off int64) (n int, err error)` - reads at a specific offset without consuming data.\n\n**Q145: What is the io.W
