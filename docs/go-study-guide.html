riterAt interface?**\nA: `WriteAt(p []byte, off int64) (n int, err error)` - writes at a specific offset.\n\n**Q146: What is a nil interface value?**\nA: An interface with both type and value set to nil. Different from an interface holding a nil pointer.\n\n**Q147: How do you check if an interface value is nil?**\nA: Simply comparing `if v == nil` works if no type is set. If type is set, it's not nil even if value is nil.\n\n---\n\n## Unit 17: Concurrency Patterns\n\n**Q148: How does the select statement work?**\nA: It blocks until one of its cases can proceed, then executes that case. If multiple are ready, it picks randomly.\n\n**Q149: What is a default case in select used for?**\nA: To make select non-blocking: `select { case <-ch: ... default: ... }` - runs default immediately if no channel is ready.\n\n**Q150: How do you implement a timeout with select?**\nA: `select { case <-ch: ... case <-time.After(duration): ... }`\n\n**Q151: What is the fan-out pattern?**\nA: Starting multiple goroutines to process from a shared channel, distributing work across workers.\n\n**Q152: What is the fan-in pattern?**\nA: Merging multiple channels into one, using select to read from multiple sources.\n\n**Q153: How do you create a pipeline pattern in Go?**\nA: Chain stages together with channels: `gen() | process() | output()` where each stage reads from previous and writes to next.\n\n**Q154: What is sync.Once used for?**\nA: To execute code exactly once, even across multiple goroutines. `once.Do(func() { ... })`.\n\n**Q155: What is sync.Pool used for?**\nA: To pool reusable objects to reduce allocation pressure and garbage collection.\n\n**Q156: How do you implement a semaphore with channels?**\nA: Use a buffered channel of size N representing available slots. Acquire by sending, release by receiving.\n\n**Q157: What is the producer-consumer pattern?**\nA: Producers send work on a channel, consumers receive and process work. Use WaitGroup to wait for completion.\n\n**Q158: What is a done channel pattern?**\nA: A channel closed by the sender when work should stop. Receivers check if channel is closed via `for range` or select.\n\n---\n\n## Unit 18: Goroutines and Channels Advanced\n\n**Q159: What happens when you close a nil channel?**\nA: It panics. You cannot close a nil channel.\n\n**Q160: What happens when you send on a closed channel?**\nA: It panics. You cannot send on a closed channel.\n\n**Q161: What happens when you receive from a closed channel?**\nA: It returns the zero value immediately. Second return value is false.\n\n**Q162: How do you detect channel closure?**\nA: `for v, ok := <-ch; ok; v, ok = <-ch { ... }` or `for v := range ch` which exits when closed.\n\n**Q163: What is a directional channel?**\nA: A channel typed to only send or only receive: `chan<- int` (send only), `<-chan int` (receive only).\n\n**Q164: Why would you use a directional channel?**\nA: To make API contracts explicit and prevent misuse - functions that only send should take send-only channels.\n\n**Q165: What is channel capacity 0 equivalent to?**\nA: An unbuffered channel - send and receive must happen simultaneously.\n\n**Q166: How do you prevent sending to a channel from blocking indefinitely?**\nA: Use a select with a default case, or use a buffered channel with capacity matching expected load.\n\n**Q167: What is the best buffer size for a channel?**\nA: Depends on the situation. Unbuffered for synchronization, small buffers (1-100) for typical async patterns.\n\n---\n\n## Unit 19: Race Conditions and Synchronization\n\n**Q168: How do you detect data races in Go?**\nA: Run with `go run -race` or `go test -race`. The race detector instruments memory accesses.\n\n**Q169: What is the Go memory model guarantees?**\nA: Memory writes in the same goroutine are visible in order. A write to channel completes before receive sees it.\n\n**Q170: What is a race condition?**\nA: When two or more goroutines access shared data and at least one access is a write.\n\n**Q171: When is sync.Mutex needed vs atomic operations?**\nA: Use Mutex for complex data or multiple operations that must be atomic together. Use atomic for simple operations on single values.\n\n**Q172: What does sync.RWMutex provide?**\nA: Multiple readers can hold the lock simultaneously, but writers get exclusive access.\n\n**Q173: What are atomic load/store operations?**\nA: `atomic.LoadInt64()`, `atomic.StoreInt64()`, `atomic.SwapInt64()` provide lock-free reads and writes.\n\n**Q174: What is atomic.AddInt64?**\nA: Atomically adds a value and returns the new result: `atomic.AddInt64(&counter, delta)`.\n\n**Q175: Why avoid global mutable variables in concurrent programs?**\nA: They create hidden state that makes concurrent access hard to reason about. Pass data explicitly via channels or parameters.\n\n---\n\n## Unit 20: Testing Deep Dive\n\n**Q176: What is the difference between testing.T and testing.B?**\nA: `T` is for functional tests, `B` is for benchmarks. B has `ResetTimer`, `SetBytes`, and `Run` methods.\n\n**Q177: How do you skip a test?**\nA: Call `t.Skip(\"reason\")` or `t.Skipf(\"format %s\", arg)` inside the test function.\n\n**Q178: What is sub-testing and when to use it?**\nA: Use `t.Run(\"name\", func(t *testing.T)` to create named subtests for organization and table-driven tests.\n\n**Q179: What is the testify/assert package advantage over t.Fatal?**\nA: `assert` continues test execution after failures (aggregates failures) vs `require` which stops immediately.\n\n**Q180: How do you use testify/require?**\nA: `require.Equal(t, expected, actual)` - same as assert but stops test on first failure.\n\n**Q181: What is testify/mock package used for?**\nA: To create mock objects and set expectations for interface method calls in tests.\n\n**Q182: How do you use table-driven tests in Go?**\nA: Define test cases as structs in a slice, iterate and call `t.Run` for each case.\n\n**Q183: How do you measure test coverage?**\nA: `go test -cover` shows coverage percentage. `go test -coverprofile=cover.out` creates a file for detailed analysis.\n\n**Q184: What is `go test -covermode=atomic`?**\nA: Uses atomic instrumentation for race-safe coverage measurement in concurrent code.\n\n**Q185: How do you run only tests matching a pattern?**\nA: `go test -run Pattern` where Pattern is a regex matching test function names.\n\n**Q186: What is benchmarking with go test?**\nA: `go test -bench=. -benchmem` runs benchmarks and shows memory allocation statistics.\n\n**Q187: How many times does a benchmark run by default?**\nA: At least 1 second or until `b.N` reaches 1e9 iterations. Minimum 3 runs for accuracy.\n\n**Q188: What is testing.Short used for?**\nA: `testing.Short()` returns true when `-short` flag is passed, useful to skip long-running tests.\n\n---\n\n## Unit 21: Context Package\n\n**Q189: What is context.Context used for?**\nA: To carry deadlines, cancellation signals, and request-scoped values across API boundaries and goroutines.\n\n**Q190: How do you create a background context?**\nA: `ctx := context.Background()` - for top-level contexts with no cancellation or deadlines.\n\n**Q191: How do you create a cancellable context?**\nA: `ctx, cancel := context.WithCancel(parent)` - cancel is a function to call when you want to cancel.\n\n**Q192: How do you add a timeout to a context?**\nA: `ctx, cancel := context.WithTimeout(parent, duration)` - auto-cancels after duration.\n\n**Q193: How do you add a deadline to a context?**\nA: `ctx, cancel := context.WithDeadline(parent, time)` - auto-cancels at specific time.\n\n**Q194: How do you pass values through context?**\nA: `ctx := context.WithValue(parent, key, value)` - retrieve with `context.Value(ctx, key)`.\n\n**Q195: What happens when a context is cancelled?**\nA: All derived contexts receive the cancellation signal. Blocking operations return immediately with `context.Canceled`.\n\n**Q196: Why should you store context values in a struct, not a map?**\nA: To ensure type safety and avoid collisions. Use unexported key types to prevent key conflicts.\n\n**Q197: How do you check if context is cancelled?**\nA: `select { case <-ctx.Done(): return ctx.Err() default: ... }` or `ctx.Err()` after a blocking call.\n\n**Q198: When should you NOT pass context?**\nA: Don't pass context to functions that don't need it. Don't store in a struct that outlives the request.\n\n---\n\n## Unit 22: Packages and Modules\n\n**Q199: What is a Go module?**\nA: A collection of Go packages versioned together, defined by a `go.mod` file in the project root.\n\n**Q200: What are the directives in go.mod?**\nA: `module` (module name), `go` (Go version), `require` (dependencies), `replace` (path replacements), `exclude` (version exclusions).\n"}];

let currentIdx = 0;
let completed = new Set(JSON.parse(localStorage.getItem('go_completed') || '[]'));
let fontSize = parseInt(localStorage.getItem('go_fontsize') || '0');

// --- Marked config ---
marked.setOptions({
  gfm: true,
  breaks: false,
});

function renderNav() {
  const nav = document.getElementById('navList');
  let html = '';
  FILES_DATA.forEach((f, i) => {
    const active = i === currentIdx ? 'active' : '';
    const done = completed.has(f.id) ? ' ✓' : '';
    html += `<div class="nav-item ${active}" onclick="selectSection(${i})">
      <span class="nav-icon">${f.icon}</span>
      <span class="nav-title">${f.title}${done}</span>
      <span class="nav-time">${f.time}</span>
    </div>`;
    // TOC for active section
    if (i === currentIdx) {
      const toc = extractTOC(f.content);
      if (toc.length > 0) {
        html += '<div class="nav-toc">';
        toc.forEach(t => {
          html += `<a class="toc-link" onclick="scrollToHeading('${t.id}')">${t.text}</a>`;
        });
        html += '</div>';
      }
    }
  });
  nav.innerHTML = html;
  updateProgress();
}

function extractTOC(md) {
  const lines = md.split('\n');
  const toc = [];
  for (const line of lines) {
    const m = line.match(/^##\s+(.+)/);
    if (m) {
      const text = m[1].replace(/[\[\]\(\)#]/g, '').trim();
      const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-$/, '');
      toc.push({ text, id });
    }
  }
  return toc;
}

function selectSection(idx) {
  currentIdx = idx;
  const f = FILES_DATA[idx];
  document.getElementById('fileName').textContent = f.file;
  document.getElementById('content').innerHTML = marked.parse(f.content);
  document.getElementById('content').scrollTop = 0;
  document.getElementById('completeBtn').textContent = completed.has(f.id) ? '✓ Done' : '☐ Mark Done';
  document.getElementById('completeBtn').style.background = completed.has(f.id) ? 'var(--green)' : '';
  document.getElementById('completeBtn').style.borderColor = completed.has(f.id) ? 'var(--green)' : '';
  // Highlight all code blocks with highlight.js
  document.querySelectorAll('#content pre code').forEach((block) => {
    hljs.highlightElement(block);
    // Add language badge + copy button
    const pre = block.parentElement;
    const lang = (block.className.match(/language-(\w+)/) || [])[1] || '';
    if (lang) {
      const header = document.createElement('div');
      header.className = 'code-header';
      header.innerHTML = `<span class="code-lang">${lang}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button>`;
      pre.insertBefore(header, block);
    }
  });
  renderNav();
  applySearch();
  localStorage.setItem('go_last_section', idx.toString());
}

function copyCode(btn) {
  const pre = btn.closest('pre');
  const code = pre.querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function nextSection() {
  if (currentIdx < FILES_DATA.length - 1) selectSection(currentIdx + 1);
}

function prevSection() {
  if (currentIdx > 0) selectSection(currentIdx - 1);
}

function toggleComplete() {
  const id = FILES_DATA[currentIdx].id;
  if (completed.has(id)) {
    completed.delete(id);
  } else {
    completed.add(id);
  }
  localStorage.setItem('go_completed', JSON.stringify([...completed]));
  selectSection(currentIdx);
  showToast(completed.has(id) ? 'Marked as completed!' : 'Unmarked');
}

function updateProgress() {
  const pct = (completed.size / FILES_DATA.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completed.size} / ${FILES_DATA.length} completed (${pct}%)`;
}

function scrollToHeading(id) {
  const el = document.getElementById(id) ||
    [...document.querySelectorAll('h2, h3')].find(
      h => h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-$/, '') === id
    );
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function changeFontSize(delta) {
  fontSize = Math.max(-1, Math.min(1, fontSize + delta));
  const content = document.getElementById('content');
  content.classList.remove('font-sm', 'font-lg');
  if (fontSize === -1) content.classList.add('font-sm');
  if (fontSize === 1) content.classList.add('font-lg');
  localStorage.setItem('go_fontsize', fontSize.toString());
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// --- Search ---
let searchTerm = '';
const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('input', (e) => {
  searchTerm = e.target.value.trim().toLowerCase();
  applySearch();
});

function applySearch() {
  if (!searchTerm) return;
  const content = document.getElementById('content');
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  // Avoid re-wrapping — just let CSS handle via innerHTML replace
  let html = content.innerHTML;
  if (searchTerm.length >= 2) {
    const escaped = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(${escaped})`, 'gi');
    // Only highlight in text, not in tags
    html = html.replace(/>([^<]+)</g, (match, text) => {
      return '>' + text.replace(re, '<mark>$1</mark>') + '<';
    });
    content.innerHTML = html;
    // Scroll to first match
    const first = content.querySelector('mark');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// --- Keyboard shortcuts ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'k' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.target === searchInput) return;
  if (e.key === 'ArrowRight' || e.key === 'n') nextSection();
  if (e.key === 'ArrowLeft' || e.key === 'p') prevSection();
  if (e.key === 'd') toggleComplete();
  if (e.key === '?') showToast('← → navigate | d = done | Ctrl+K = search');
});

// --- Init ---
(function init() {
  const lastIdx = parseInt(localStorage.getItem('go_last_section') || '0');
  if (fontSize === -1) document.getElementById('content').classList.add('font-sm');
  if (fontSize === 1) document.getElementById('content').classList.add('font-lg');
  selectSection(lastIdx);
  // Mobile menu button
  if (window.innerWidth <= 768) {
    document.getElementById('menuBtn').style.display = 'block';
  }
})();
</script>
