<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Go Senior Engineer — Study Guide</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/tokyo-night-dark.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a1a;
  --bg2: #0f0f2a;
  --bg3: #1a1a3e;
  --border: #2a2a5e;
  --text: #e0e0ff;
  --text2: #7878aa;
  --accent: #00f0ff;
  --accent2: #7b2fff;
  --green: #00ff9f;
  --orange: #ff6b00;
  --red: #ff0055;
  --pink: #ff2d95;
  --yellow: #f0e040;
  --code-bg: #080818;
  --sidebar-w: 270px;
  --glow-cyan: 0 0 10px rgba(0,240,255,0.3);
  --glow-pink: 0 0 10px rgba(255,45,149,0.3);
  --glow-green: 0 0 10px rgba(0,255,159,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Rajdhani', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(123,47,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0,240,255,0.05) 0%, transparent 50%);
}

/* --- Sidebar --- */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: transform 0.3s;
  box-shadow: 2px 0 20px rgba(123,47,255,0.1);
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(123,47,255,0.15), rgba(0,240,255,0.08));
}
.sidebar-header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  color: var(--accent);
  margin-bottom: 4px;
  text-shadow: var(--glow-cyan);
  letter-spacing: 1px;
}
.sidebar-header p {
  font-size: 11px;
  color: var(--pink);
  text-shadow: var(--glow-pink);
  letter-spacing: 0.5px;
}
.search-box {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.search-box input {
  width: 100%;
  padding: 6px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
  transition: all 0.2s;
}
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: var(--glow-cyan), inset 0 0 8px rgba(0,240,255,0.1);
}
.search-box input::placeholder { color: var(--text2); }
.nav-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.nav-item {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  border-left: 3px solid transparent;
  transition: all 0.2s;
  gap: 8px;
  font-weight: 500;
}
.nav-item:hover {
  background: rgba(0,240,255,0.05);
  color: var(--accent);
  border-left-color: rgba(0,240,255,0.3);
}
.nav-item.active {
  background: linear-gradient(90deg, rgba(0,240,255,0.1), transparent);
  color: var(--accent);
  border-left-color: var(--accent);
  text-shadow: var(--glow-cyan);
}
.nav-icon { font-size: 16px; width: 22px; text-align: center; }
.nav-title { flex: 1; font-weight: 500; }
.nav-time { font-size: 11px; color: var(--text2); }
.nav-toc {
  display: none;
  padding: 2px 0 4px 46px;
  font-size: 12px;
}
.nav-item.active + .nav-toc { display: block; }
.toc-link {
  display: block;
  padding: 3px 8px;
  color: var(--text2);
  cursor: pointer;
  border-radius: 4px;
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toc-link:hover { color: var(--accent); background: rgba(0,240,255,0.08); }

/* --- Progress bar --- */
.progress-bar {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.progress-track {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 2px;
  transition: width 0.3s;
  box-shadow: 0 0 8px rgba(0,255,159,0.4);
}
.progress-text {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
  text-align: center;
}

/* --- Main content --- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.toolbar {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  gap: 10px;
  min-height: 44px;
}
.toolbar .file-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--pink);
  flex: 1;
  text-shadow: var(--glow-pink);
}
.btn {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: var(--glow-cyan);
}
.btn.primary {
  background: transparent;
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: var(--glow-cyan);
}
.btn.primary:hover {
  background: rgba(0,240,255,0.15);
  box-shadow: 0 0 20px rgba(0,240,255,0.4);
}
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 40px 60px;
  max-width: 900px;
  scroll-behavior: smooth;
}

/* --- Markdown styles --- */
.content h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
  padding-bottom: 8px;
  margin: 0 0 16px;
  text-shadow: var(--glow-cyan);
  letter-spacing: 1px;
}
.content h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  color: var(--pink);
  border-bottom: 1px solid var(--border);
  border-image: linear-gradient(90deg, var(--pink), transparent) 1;
  padding-bottom: 6px;
  margin: 28px 0 12px;
  text-shadow: var(--glow-pink);
  letter-spacing: 0.5px;
}
.content h3 {
  font-size: 14px;
  color: var(--green);
  margin: 20px 0 8px;
  text-shadow: var(--glow-green);
  font-weight: 600;
}
.content p { margin: 8px 0; line-height: 1.65; font-size: 14px; }
.content ul, .content ol { margin: 8px 0; padding-left: 24px; font-size: 14px; }
.content li { margin: 4px 0; line-height: 1.55; }
.content li::marker { color: var(--accent); }
.content hr {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, var(--accent), var(--pink), transparent);
  margin: 20px 0;
  opacity: 0.5;
}
.content blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 14px;
  margin: 10px 0;
  background: rgba(0,240,255,0.04);
  border-radius: 0 4px 4px 0;
  font-size: 13px;
  color: var(--text2);
  box-shadow: inset 2px 0 8px rgba(0,240,255,0.05);
}
.content code {
  font-family: "JetBrains Mono", "SF Mono", "Fira Code", Menlo, monospace;
  font-size: 12px;
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 4px;
}
.content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0;
  overflow-x: auto;
  margin: 10px 0;
  position: relative;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(0,240,255,0.05);
}
.content pre code {
  font-family: 'JetBrains Mono', monospace;
  background: none;
  padding: 14px 16px;
  font-size: 12.5px;
  line-height: 1.55;
  display: block;
}
.content pre code.hljs {
  background: var(--code-bg);
  border-radius: 0 0 6px 6px;
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 12px;
  background: linear-gradient(90deg, var(--bg3), var(--bg2));
  border-bottom: 1px solid var(--border);
  border-radius: 6px 6px 0 0;
  font-size: 11px;
}
.code-lang {
  font-family: 'Orbitron', sans-serif;
  color: var(--accent);
  font-weight: 500;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  text-shadow: var(--glow-cyan);
}
.copy-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 3px;
  padding: 2px 8px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
.copy-btn:hover { color: var(--accent); border-color: var(--accent); box-shadow: var(--glow-cyan); }
.copy-btn.copied { color: var(--green); border-color: var(--green); box-shadow: var(--glow-green); }
.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 13px;
}
.content th, .content td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.content th {
  background: var(--bg3);
  font-weight: 600;
  color: var(--accent);
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  text-shadow: var(--glow-cyan);
}
.content tr:nth-child(even) { background: rgba(0,240,255,0.02); }
.content tr:hover { background: rgba(0,240,255,0.05); }
.content strong { color: var(--accent); }
.content a { color: var(--accent); text-decoration: none; text-shadow: var(--glow-cyan); }
.content a:hover { color: var(--pink); text-shadow: var(--glow-pink); }

/* --- Search highlight --- */
mark {
  background: rgba(255,45,149,0.3);
  color: var(--text);
  border-radius: 2px;
  padding: 0 2px;
  box-shadow: 0 0 6px rgba(255,45,149,0.3);
}

/* --- Keyboard shortcuts toast --- */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--bg3);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  text-shadow: var(--glow-cyan);
  box-shadow: var(--glow-cyan);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; }

/* --- Scrollbar --- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); box-shadow: var(--glow-cyan); }

/* --- Mobile --- */
@media (max-width: 768px) {
  .sidebar { position: fixed; z-index: 50; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .content { padding: 16px 20px 40px; }
}

/* Font size control */
.content.font-sm { font-size: 12px; }
.content.font-sm p, .content.font-sm li { font-size: 12px; }
.content.font-lg { font-size: 16px; }
.content.font-lg p, .content.font-lg li { font-size: 16px; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Go Study Guide</h1>
    <p>Senior AI Engineer — 3h refresh</p>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search... (Ctrl+K)" autocomplete="off">
  </div>
  <div class="nav-list" id="navList"></div>
  <div class="progress-bar">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 9 completed</div>
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <button class="btn" id="menuBtn" style="display:none" onclick="toggleSidebar()">☰</button>
    <span class="file-name" id="fileName"></span>
    <button class="btn" onclick="changeFontSize(-1)">A-</button>
    <button class="btn" onclick="changeFontSize(1)">A+</button>
    <button class="btn" id="completeBtn" onclick="toggleComplete()">✓ Done</button>
    <button class="btn" onclick="prevSection()">← Prev</button>
    <button class="btn primary" onclick="nextSection()">Next →</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<script>
const FILES_DATA = [{"id": "golang_spec", "file": "golang-spec.md", "title": "Go Spec", "time": "20 min", "icon": "\ud83d\udcd8", "content": "# Go Language Specification Cheatsheet\n\n> Quick reference for Go language fundamentals \u2014 interview essential.\n\n---\n\n## Table of Contents\n1. [Types & Values](#1-types--values)\n2. [Control Flow](#2-control-flow)\n3. [Functions](#3-functions)\n4. [Methods & Interfaces](#4-methods--interfaces)\n5. [Concurrency](#5-concurrency)\n6. [Memory & Pointers](#6-memory--pointers)\n7. [Packages & Visibility](#7-packages--visibility)\n\n---\n\n## 1. Types & Values\n\n### Primitive Types\n\n```go\n// Integer types\nint   int8  int16  int32  int64    // Signed\nuint  uint8 uint16 uint32 uint64   // Unsigned\nbyte  // alias for uint8\nrune  // alias for int32 (Unicode code point)\n\n// Floating-point\nfloat32  float64\n\n// Other\nbool    // true, false\nstring  // Immutable UTF-8 sequence\ncomplex64  complex128  // Complex numbers\n```\n\n### Zero Values\n\n| Type | Zero Value |\n|------|------------|\n| Numeric | `0` |\n| Boolean | `false` |\n| String | `\"\"` |\n| Pointer, slice, map, channel, interface | `nil` |\n| Struct | All fields set to zero values |\n\n```go\nvar i int      // 0\nvar f float64  // 0\nvar b bool     // false\nvar s string   // \"\"\nvar p *int     // nil\n```\n\n### Type Conversion\n\n> **Go has no implicit type conversion** \u2014 must use explicit conversion.\n\n```go\ni := 42\nf := float64(i)    // int \u2192 float64\ns := string(i)     // int \u2192 Unicode character (byte)\nui := uint(i)      // int \u2192 uint\n```\n\n### Constants & iota\n\n```go\nconst (\n    A = iota  // 0\n    B         // 1\n    C         // 2\n)\n\nconst (\n    _         = iota  // skip 0\n    KB int = 1 << (10 * iota)  // 1024\n    MB                           // 1048576\n    GB                           // 1073741824\n)\n```\n\n### Strings\n\n```go\ns := \"Hello, \u4e16\u754c\"            // Interpreted string literal\ns2 := `Hello, \\n World`      // Raw string literal (no escape processing)\n\n// Length: bytes vs runes\nlen(s)                       // bytes: 13\nutf8.RuneCountInString(s)    // runes: 9\n\n// Iteration\nfor i, r := range s {\n    fmt.Println(i, r)  // i=byte index, r=rune\n}\n```\n\n> **TL;DR**: `len(\"hello\")` = 5 bytes, `len(\"h\u00e9llo\")` = 6 bytes (UTF-8).\n\n---\n\n## 2. Control Flow\n\n### if/else\n\n```go\n// Basic\nif x > 0 {\n    fmt.Println(\"positive\")\n} else if x < 0 {\n    fmt.Println(\"negative\")\n} else {\n    fmt.Println(\"zero\")\n}\n\n// With initialization (scoped)\nif err := doSomething(); err != nil {\n    return err\n}\n```\n\n### Switch\n\n```go\n// Expression switch (no fall-through by default!)\nswitch day {\ncase \"Mon\", \"Tue\":\n    fmt.Println(\"early week\")\ncase \"Wed\":\n    fmt.Println(\"mid week\")\ndefault:\n    fmt.Println(\"other day\")\n}\n\n// No expression = boolean switch\nswitch {\ncase x > 0:\n    fmt.Println(\"positive\")\ncase x < 0:\n    fmt.Println(\"negative\")\n}\n\n// fallthrough (rarely used)\nswitch x {\ncase 1:\n    fmt.Println(\"one\")\n    fallthrough  // continues to next case\ncase 2:\n    fmt.Println(\"one or two\")\n}\n```\n\n### For Loop (only loop in Go!)\n\n```go\n// Classic C-style\nfor i := 0; i < 10; i++ {\n    fmt.Println(i)\n}\n\n// While-style (condition only)\nfor i < 100 {\n    i *= 2\n}\n\n// Infinite loop\nfor {\n    if done { break }\n}\n\n// range\nnums := []int{1, 2, 3}\nfor i, v := range nums {\n    fmt.Printf(\"%d: %d\\n\", i, v)\n}\n\n// Map iteration (random order!)\nm := map[string]int{\"a\": 1, \"b\": 2}\nfor k, v := range m {\n    fmt.Printf(\"%s: %d\\n\", k, v)\n}\n\n// String/rune iteration\nfor i, r := range \"hello\" {\n    fmt.Printf(\"%d: %c\\n\", i, r)\n}\n```\n\n### Break & Continue with Labels\n\n```go\nouter:\nfor i := 0; i < 5; i++ {\n    for j := 0; j < 5; j++ {\n        if i == 2 && j == 2 {\n            break outer  // breaks outer loop\n        }\n    }\n}\n```\n\n---\n\n## 3. Functions\n\n### Basic Function\n\n```go\nfunc greet(name string) string {\n    return \"Hello, \" + name\n}\n```\n\n### Multiple Return Values\n\n> **Key Go feature** \u2014 used for error handling.\n\n```go\nfunc divide(a, b float64) (float64, error) {\n    if b == 0 {\n        return 0, errors.New(\"division by zero\")\n    }\n    return a / b, nil\n}\n\n// Usage\nresult, err := divide(10, 2)\nif err != nil {\n    log.Fatal(err)\n}\n```\n\n### Named Return Values\n\n```go\nfunc split(sum int) (x, y int) {\n    x = sum * 4 / 9\n    y = sum - x\n    return  // naked return (use sparingly)\n}\n```\n\n### Variadic Functions\n\n```go\nfunc sum(nums ...int) int {\n    total := 0\n    for _, n := range nums {\n        total += n\n    }\n    return total\n}\n\nsum(1, 2, 3)      // 6\nsum([]int{1, 2}...) // spread operator\n```\n\n### First-Class Functions & Closures\n\n```go\n// Function as parameter\nfunc apply(fn func(int) int, val int) int {\n    return fn(val)\n}\n\n// Closure\nfunc adder() func(int) int {\n    sum := 0\n    return func(x int) int {\n        sum += x\n        return sum\n    }\n}\n\nadd := adder()\nadd(5)  // 5\nadd(3)  // 8\n```\n\n### defer\n\n> **defer** executes AFTER the surrounding function returns, in LIFO order.\n\n```go\nfunc readFile(name string) {\n    f, err := os.Open(name)\n    if err != nil {\n        return  // early return still runs defer!\n    }\n    defer f.Close()  // executes when readFile returns\n    \n    // ... read file\n}\n\n// Multiple defers: LIFO order\nfunc example() {\n    defer fmt.Println(\"1\")\n    defer fmt.Println(\"2\")\n    defer fmt.Println(\"3\")\n    // Output: 3, 2, 1\n}\n```\n\n### panic & recover\n\n```go\nfunc safeCall() {\n    defer func() {\n        if r := recover(); r != nil {\n            fmt.Printf(\"Recovered: %v\\n\", r)\n        }\n    }()\n    panic(\"something went wrong\")\n}\n```\n\n---\n\n## 4. Methods & Interfaces\n\n### Structs\n\n```go\ntype Person struct {\n    Name string\n    Age  int\n}\n\n// Creating instances\np1 := Person{Name: \"Alice\", Age: 30}\np2 := Person{}  // zero values\np3 := &Person{Name: \"Bob\"}  // pointer\n```\n\n### Methods with Receivers\n\n```go\n// Value receiver (works on copy)\nfunc (p Person) Greet() string {\n    return fmt.Sprintf(\"Hi, I'm %s\", p.Name)\n}\n\n// Pointer receiver (modifies original)\nfunc (p *Person) SetAge(age int) {\n    p.Age = age\n}\n```\n\n> **Rule**: Use pointer receiver when method modifies the struct or when struct is large.\n\n### Method Sets\n\n| Value Type T | Pointer Type *T |\n|--------------|-----------------|\n| Methods with value receiver | Methods with value receiver |\n| Does **not** include methods with pointer receiver | Also includes methods with pointer receiver |\n\n```go\ntype Person struct {\n    Name string\n}\n\nfunc (p Person) Walk() {}\nfunc (p *Person) Run() {}\n\nvar p Person\np.Walk()  // \u2713 (p is addressable, *p has Run)\np.Run()    // \u2713 (compiler takes &p)\n\n// But:\nPerson.Walk(p)   // \u2713\nPerson.Run(p)    // \u2717 (p doesn't have Run method)\n(*Person).Run(&p) // \u2713\n```\n\n### Interfaces\n\n```go\ntype Reader interface {\n    Read(p []byte) (n int, err error)\n}\n\ntype Writer interface {\n    Write(p []byte) (n int, err error)\n}\n\n// Common standard library interfaces:\n// io.Reader, io.Writer, io.Closer, error\n```\n\n### Empty Interface\n\n```go\n// interface{} accepts any type (like Object in Java)\nvar any interface{} = 42\nany = \"hello\"\nany = []int{1, 2, 3}\n\n// any is alias for interface{} (Go 1.18+)\nvar anything any = \"string\"\n```\n\n### Nil Interface Gotcha\n\n```go\ntype MyError struct {\n    msg string\n}\n\nfunc (e *MyError) Error() string { return e.msg }\n\nfunc returnsNil() error {\n    var err *MyError = nil\n    return err\n}\n\nerr := returnsNil()\nfmt.Println(err == nil) // false\n```\n\n> **Why?** Interface values store `(dynamic type, dynamic value)`. Here the dynamic value is nil, but the dynamic type is `*MyError`, so the interface itself is non-nil.\n\n### Type Assertions & Switches\n\n```go\n// Type assertion (unsafe)\nvar i interface{} = \"hello\"\ns := i.(string)  // panics if not string\n\n// Safe type assertion (comma-ok idiom)\ns, ok := i.(string)  // ok = true/false\n\n// Type switch\nswitch v := i.(type) {\ncase string:\n    fmt.Printf(\"string: %s\\n\", v)\ncase int:\n    fmt.Printf(\"int: %d\\n\", v)\ndefault:\n    fmt.Printf(\"unknown: %T\\n\", v)\n}\n```\n\n### Error Handling Pattern\n\n```go\n// Standard error interface\ntype error interface {\n    Error() string\n}\n\n// Creating errors\nerrors.New(\"something went wrong\")\nfmt.Errorf(\"value %d is invalid\", x)\n\n// Checking errors\nif err != nil {\n    return err  // propagate\n}\n\n// Wrapping errors\noriginalErr := errors.New(\"disk full\")\nerr := fmt.Errorf(\"failed: %w\", originalErr)\nerrors.Is(err, originalErr)  // true\n\nvar myError *MyError\nerrors.As(err, &myError)     // extract concrete type\n\n// Joining multiple errors (Go 1.20+)\nerrDB := errors.New(\"db unavailable\")\nerrCache := errors.New(\"cache unavailable\")\njoined := errors.Join(errDB, errCache)\nerrors.Is(joined, errDB)     // true\nerrors.Is(joined, errCache)  // true\n```\n\n---\n\n## 5. Concurrency\n\n### Goroutines\n\n```go\n// Start goroutine\ngo func() {\n    fmt.Println(\"Runs concurrently\")\n}()\n\n// Wait for goroutine\nvar wg sync.WaitGroup\nwg.Add(1)\ngo func() {\n    defer wg.Done()\n    fmt.Println(\"done\")\n}()\nwg.Wait()\n```\n\n### Channels\n\n```go\n// Create channel\nch := make(chan int)           // unbuffered\nch := make(chan int, 10)        // buffered\n\n// Send/Receive\nch <- 42                       // send\nvalue := <-ch                  // receive\n\n// Close\nclose(ch)\n\n// Buffered vs Unbuffered\n// Unbuffered: send blocks until receive (synchronous)\n// Buffered: send blocks only when full\n```\n\n### Range & Select\n\n```go\n// Range over channel (closes when sender closes)\nfor v := range ch {\n    fmt.Println(v)\n}\n\n// Select (multiplex multiple channels)\nselect {\ncase msg := <-ch1:\n    fmt.Println(msg)\ncase msg := <-ch2:\n    fmt.Println(msg)\ncase <-time.After(time.Second):\n    fmt.Println(\"timeout\")\ndefault:\n    fmt.Println(\"no message\")\n}\n```\n\n### sync Package\n\n```go\n// Mutex (mutual exclusion)\nvar mu sync.Mutex\nmu.Lock()\ndefer mu.Unlock()\n\n// RWMutex (multiple readers, single writer)\nvar rwmu sync.RWMutex\nrwmu.RLock()  // multiple allowed\ndefer rwmu.RUnlock()\n\n// WaitGroup (wait for goroutines)\nvar wg sync.WaitGroup\nwg.Add(1)\ngo func() { defer wg.Done(); work() }()\nwg.Wait()\n\n// Once (execute exactly once)\nvar once sync.Once\nonce.Do(func() { init() })\n\n// Map (concurrent-safe map)\nvar m sync.Map\nm.Store(\"key\", \"value\")\nval, ok := m.Load(\"key\")\n```\n\n### Context\n\n```go\n// Create contexts\nctx := context.Background()      // empty context\nctx, cancel := context.WithCancel(parent)\nctx, cancel := context.WithTimeout(parent, 5*time.Second)\nctx, cancel := context.WithDeadline(parent, someTime)\n\n// With value\nctx := context.WithValue(ctx, key, value)\n\n// Check cancellation\nselect {\ncase <-ctx.Done():\n    return ctx.Err()\ndefault:\n    // not cancelled\n}\n```\n\n---\n\n## 6. Memory & Pointers\n\n### Pointers\n\n```go\ni := 42\np := &i               // *int pointer to i\n\nfmt.Println(*p)       // dereference: 42\n*p = 21               // modify through pointer\nfmt.Println(i)        // 21\n\n// Pointer to struct\nper := &Person{Name: \"Bob\"}\nper.Name  // same as (*per).Name\n```\n\n### Pointer vs Value\n\n```go\nfunc byValue(x int) { x = 100 }    // copy\nfunc byPointer(x *int) { *x = 100 } // shared\n\ni := 42\nbyValue(i)\nfmt.Println(i)  // 42\n\nbyPointer(&i)\nfmt.Println(i)  // 100\n```\n\n### Stack vs Heap\n\n> **Go uses escape analysis** to determine where variables live.\n\n```go\n// Variable escapes to heap if:\n// - Returned by pointer\n// - Sent to channel\n// - Stored in interface{}\n// - Closures that outlive function\n\nfunc create() *int {\n    i := 42        // escapes to heap\n    return &i\n}\n```\n\n### nil\n\n```go\nvar p *int        // nil pointer\nvar s []int       // nil slice\nvar m map[int]int // nil map\nvar c chan int    // nil channel\n\n// nil slices are valid for append, len, range\nvar s []int\ns = append(s, 1)  // works! allocates new slice\n\n// nil maps cannot be written to\nvar m map[int]int\nm = make(map[int]int)  // initialize before use\n```\n\n---\n\n## 7. Packages & Visibility\n\n### Export Rules\n\n> **Capitalized = exported** (public). Lowercase = unexported (private to package).\n\n```go\npackage mypackage\n\ntype MyStruct struct {     // exported\n    PublicField string    // exported\n    privateField string   // unexported\n}\n\nfunc PublicFunc() {}      // exported\nfunc privateFunc() {}     // unexported\n```\n\n### init() Function\n\n```go\n// Runs before main(), cannot be called\nfunc init() {\n    // Initialize package state\n    db = connect()\n}\n```\n\n### Import Variations\n\n```go\nimport (\n    \"fmt\"                        // normal\n    f \"fmt\"                      // alias\n    . \"fmt\"                      // exported names in current namespace\n    _ \"database/sql\"             // side-effect only (calls init)\n)\n```\n\n### Package Initialization Order\n\n1. Imported packages initialized first\n2. `init()` functions run in declaration order\n3. Global variables initialized before `init()`\n4. `main()` runs last\n\n---\n\n## Quick Reference\n\n| Concept | Syntax |\n|---------|--------|\n| Array | `[5]int{1,2,3,4,5}` |\n| Slice | `[]int{1,2,3}` |\n| Map | `map[string]int{\"a\": 1}` |\n| Channel | `make(chan int)` |\n| Function type | `func(int) string` |\n| Interface | `interface{ Method() }` |\n| Pointer | `*int`, `&value` |\n| Nil check | `if err != nil` |\n\n---\n\n## Interview Tips\n\n1. **Slices vs Arrays**: Arrays are fixed-size values; slices are dynamic views into arrays\n2. **Maps**: Writing to nil map panics \u2014 always `make()` first\n3. **Interfaces**: Value with nil pointer \u2260 nil interface\n4. **Goroutines**: Don't forget to synchronize or use context cancellation\n5. **defer**: Runs after return, even on panic \u2014 use for cleanup\n6. **Type conversion**: Always explicit, no implicit widening\n"}, {"id": "generics", "file": "generics.md", "title": "Generics", "time": "15 min", "icon": "\ud83e\uddec", "content": "# Go Generics Cheatsheet (Go 1.18+)\n\n> Type parameters, constraints, and idiomatic generic patterns for senior interviews.\n\n---\n\n## Table of Contents\n1. [Type Parameters](#1-type-parameters)\n2. [Constraints](#2-constraints)\n3. [Generic Data Structures](#3-generic-data-structures)\n4. [Generic Patterns](#4-generic-patterns)\n5. [Gotchas & Limitations](#5-gotchas--limitations)\n\n---\n\n## 1. Type Parameters\n\n### Basic Generic Function\n\n```go\nfunc Map[T any, R any](s []T, f func(T) R) []R {\n    result := make([]R, len(s))\n    for i, v := range s {\n        result[i] = f(v)\n    }\n    return result\n}\n\n// Usage\nnames := Map([]int{1, 2, 3}, func(n int) string {\n    return fmt.Sprintf(\"item-%d\", n)\n})\n```\n\n### Generic Type\n\n```go\ntype Pair[T, U any] struct {\n    First  T\n    Second U\n}\n\nfunc NewPair[T, U any](first T, second U) Pair[T, U] {\n    return Pair[T, U]{First: first, Second: second}\n}\n\np := NewPair(\"age\", 30) // Pair[string, int]\n```\n\n### Generic Method (receiver only \u2014 no new type params on methods)\n\n```go\ntype Stack[T any] struct {\n    items []T\n}\n\n// OK: method uses receiver's type param\nfunc (s *Stack[T]) Push(v T) { s.items = append(s.items, v) }\nfunc (s *Stack[T]) Pop() (T, bool) {\n    if len(s.items) == 0 {\n        var zero T\n        return zero, false\n    }\n    v := s.items[len(s.items)-1]\n    s.items = s.items[:len(s.items)-1]\n    return v, true\n}\n\n// NOT allowed: func (s *Stack[T]) Convert[U any]() Stack[U] \u2014 compile error\n```\n\n> **Key rule**: Methods cannot introduce new type parameters. Use a standalone function instead.\n\n### Type Inference\n\n```go\n// Compiler infers types \u2014 no need to specify explicitly\nresult := Map([]int{1, 2, 3}, strconv.Itoa) // infers [int, string]\n\n// Explicit when inference fails\nresult := Map[int, string](nums, convert)\n```\n\n---\n\n## 2. Constraints\n\n### Built-in Constraints\n\n```go\nimport \"cmp\"      // Go 1.21+\nimport \"constraints\" // golang.org/x/exp/constraints (pre-1.21)\n\n// any         \u2014 no constraint (alias for interface{})\n// comparable  \u2014 supports == and != (built-in)\n// cmp.Ordered \u2014 supports < > <= >= (int, float, string types)\n```\n\n### Custom Constraints (Interface with Type Terms)\n\n```go\n// Union of types\ntype Number interface {\n    ~int | ~int8 | ~int16 | ~int32 | ~int64 |\n    ~float32 | ~float64\n}\n\n// ~ means \"underlying type\" \u2014 includes named types\ntype Celsius float64  // matches ~float64\n\n// Constraint with methods AND types\ntype Stringer interface {\n    ~int | ~string\n    String() string\n}\n```\n\n### Constraint Composition\n\n```go\ntype Addable interface {\n    Number\n    comparable\n}\n\nfunc Sum[T Addable](vals []T) T {\n    var total T\n    for _, v := range vals {\n        total += v\n    }\n    return total\n}\n```\n\n### `comparable` vs `cmp.Ordered`\n\n| Constraint | Operators | Use for |\n|---|---|---|\n| `comparable` | `==`, `!=` | Map keys, dedup, equality checks |\n| `cmp.Ordered` | `<`, `>`, `<=`, `>=`, `==`, `!=` | Sorting, min/max, ranges |\n\n```go\nfunc Contains[T comparable](s []T, target T) bool {\n    for _, v := range s {\n        if v == target { return true }\n    }\n    return false\n}\n\nfunc Max[T cmp.Ordered](a, b T) T {\n    if a > b { return a }\n    return b\n}\n```\n\n---\n\n## 3. Generic Data Structures\n\n### Generic Set\n\n```go\ntype Set[T comparable] map[T]struct{}\n\nfunc NewSet[T comparable](vals ...T) Set[T] {\n    s := make(Set[T], len(vals))\n    for _, v := range vals {\n        s[v] = struct{}{}\n    }\n    return s\n}\n\nfunc (s Set[T]) Add(v T)           { s[v] = struct{}{} }\nfunc (s Set[T]) Has(v T) bool      { _, ok := s[v]; return ok }\nfunc (s Set[T]) Delete(v T)        { delete(s, v) }\nfunc (s Set[T]) Len() int          { return len(s) }\n\nfunc (s Set[T]) Union(other Set[T]) Set[T] {\n    result := NewSet[T]()\n    for v := range s { result.Add(v) }\n    for v := range other { result.Add(v) }\n    return result\n}\n```\n\n### Generic Result (Option/Either)\n\n```go\ntype Result[T any] struct {\n    Value T\n    Err   error\n}\n\nfunc Ok[T any](v T) Result[T]      { return Result[T]{Value: v} }\nfunc Fail[T any](err error) Result[T] { return Result[T]{Err: err} }\n\nfunc (r Result[T]) Unwrap() (T, error) { return r.Value, r.Err }\n\nfunc (r Result[T]) Map(f func(T) T) Result[T] {\n    if r.Err != nil { return r }\n    return Ok(f(r.Value))\n}\n```\n\n### Generic Linked List\n\n```go\ntype Node[T any] struct {\n    Value T\n    Next  *Node[T]\n}\n\ntype List[T any] struct {\n    Head *Node[T]\n    Len  int\n}\n\nfunc (l *List[T]) Prepend(v T) {\n    l.Head = &Node[T]{Value: v, Next: l.Head}\n    l.Len++\n}\n```\n\n---\n\n## 4. Generic Patterns\n\n### Functional Utilities\n\n```go\nfunc Filter[T any](s []T, pred func(T) bool) []T {\n    var result []T\n    for _, v := range s {\n        if pred(v) { result = append(result, v) }\n    }\n    return result\n}\n\nfunc Reduce[T, R any](s []T, init R, f func(R, T) R) R {\n    acc := init\n    for _, v := range s {\n        acc = f(acc, v)\n    }\n    return acc\n}\n\nfunc GroupBy[T any, K comparable](s []T, key func(T) K) map[K][]T {\n    m := make(map[K][]T)\n    for _, v := range s {\n        k := key(v)\n        m[k] = append(m[k], v)\n    }\n    return m\n}\n```\n\n### Generic Cache / Memoize\n\n```go\ntype Cache[K comparable, V any] struct {\n    mu    sync.RWMutex\n    items map[K]V\n}\n\nfunc NewCache[K comparable, V any]() *Cache[K, V] {\n    return &Cache[K, V]{items: make(map[K]V)}\n}\n\nfunc (c *Cache[K, V]) Get(key K) (V, bool) {\n    c.mu.RLock()\n    defer c.mu.RUnlock()\n    v, ok := c.items[key]\n    return v, ok\n}\n\nfunc (c *Cache[K, V]) Set(key K, val V) {\n    c.mu.Lock()\n    defer c.mu.Unlock()\n    c.items[key] = val\n}\n```\n\n### Type Switch with Generics\n\n```go\nfunc PrintTyped[T any](v T) {\n    // Cannot type-switch on T directly \u2014 use any interface\n    switch val := any(v).(type) {\n    case int:    fmt.Printf(\"int: %d\\n\", val)\n    case string: fmt.Printf(\"string: %s\\n\", val)\n    default:     fmt.Printf(\"other: %v\\n\", val)\n    }\n}\n```\n\n> **Key**: Cast to `any` first with `any(v)`, then type-switch.\n\n---\n\n## 5. Gotchas & Limitations\n\n### No Method Type Parameters\n\n```go\n// \u274c NOT allowed\nfunc (s *Stack[T]) Map[U any](f func(T) U) *Stack[U] { ... }\n\n// \u2705 Use standalone function\nfunc MapStack[T, U any](s *Stack[T], f func(T) U) *Stack[U] { ... }\n```\n\n### No Specialization\n\n```go\n// \u274c Cannot specialize for a specific type\nfunc Process[T any](v T) { ... }       // generic version\nfunc Process[int](v int) { ... }       // NOT allowed \u2014 no overloading\n```\n\n### Zero Value\n\n```go\nfunc Zero[T any]() T {\n    var zero T  // always the zero value of T\n    return zero\n}\n// int \u2192 0, string \u2192 \"\", pointer \u2192 nil, struct \u2192 empty struct\n```\n\n### Struct Field Access Requires Constraint\n\n```go\n// \u274c Cannot access .Name \u2014 T is `any`\nfunc GetName[T any](v T) string { return v.Name }\n\n// \u2705 Define interface constraint\ntype Named interface { GetName() string }\nfunc GetName[T Named](v T) string { return v.GetName() }\n```\n\n### Comparable Gotcha \u2014 Runtime Panic\n\n```go\nfunc Equal[T comparable](a, b T) bool {\n    return a == b // compiles, but can panic at runtime!\n}\n\n// This compiles because interface{} satisfies comparable,\n// but panics if the underlying type is uncomparable (e.g., []int)\nvar a, b interface{} = []int{1}, []int{1}\nEqual(a, b) // PANIC: comparing uncomparable type []int\n```\n\n---\n\n## Quick Reference\n\n| Feature | Syntax |\n|---|---|\n| Type param function | `func F[T Constraint](x T) T` |\n| Type param struct | `type S[T any] struct { V T }` |\n| Multiple params | `func F[T, U any](a T, b U)` |\n| Constraint union | `interface{ ~int \\| ~float64 }` |\n| Underlying type | `~int` matches `type MyInt int` |\n| Comparable | `comparable` \u2014 supports `==` / `!=` |\n| Ordered | `cmp.Ordered` \u2014 supports `<` `>` etc. |\n| Zero value | `var zero T` |\n| Type switch | `switch any(v).(type)` |\n\n## Interview Tips\n\n- **Why generics?** Eliminate code duplication without `interface{}` + type assertions (type-safe, no reflection)\n- **When NOT to use**: If only 1-2 concrete types needed \u2014 just write concrete functions\n- **Performance**: Generics use **GCShape stenciling** \u2014 similar shapes share code, minimal overhead\n- **stdlib additions**: `slices`, `maps`, `cmp` packages (Go 1.21+)\n- **Design philosophy**: Go generics are intentionally simpler than C++ templates or Rust generics \u2014 no specialization, no HKT, no const generics"}, {"id": "slices", "file": "slices.md", "title": "Slices", "time": "10 min", "icon": "\ud83d\udd2a", "content": "# Go Slices Deep Dive Cheatsheet\n\n> Everything you need to know about slices for interviews and production Go.\n\n---\n\n## Table of Contents\n1. [Slice Anatomy](#1-slice-anatomy)\n2. [Creation](#2-creation)\n3. [Append Mechanics](#3-append-mechanics)\n4. [Operations](#4-common-operations)\n5. [2D Slices](#5-2d-slices)\n6. [Gotchas](#6-gotchas)\n\n---\n\n## 1. Slice Anatomy\n\n### Internal Structure\n\nA slice is a **descriptor** containing three fields:\n\n```go\ntype slice struct {\n    array unsafe.Pointer  // pointer to underlying array\n    len   int            // number of elements\n    cap   int            // capacity (max elements before realloc)\n}\n```\n\n### Visual Representation\n\n```\nSlice Header          Underlying Array\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510     \u250c\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2510\n\u2502 ptr \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u25ba\u2502     \u2502 0 \u2502 1 \u2502 2 \u2502 3 \u2502 4 \u2502 5 \u2502 6 \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524     \u2514\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2518\n\u2502 len = 4     \u2502\n\u2502 cap = 7     \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Key Properties\n\n```go\ns := []int{0, 1, 2, 3, 4, 5, 6}\n\n// Length: number of elements\nlen(s)  // 7\n\n// Capacity: elements in underlying array\ncap(s)  // 7\n\n// Both are O(1) \u2014 just reads from header\n```\n\n---\n\n## 2. Creation\n\n### Literal Initialization\n\n```go\n// Explicit values\ns1 := []int{1, 2, 3}\n\n// Empty slice\ns2 := []int{}\n\n// With capacity hint\ns3 := make([]int, 0, 10)  // len=0, cap=10\n```\n\n### make() Variants\n\n```go\n// make([]T, len)\ns1 := make([]int, 3)      // [0, 0, 0], len=3, cap=3\n\n// make([]T, len, cap)\ns2 := make([]int, 0, 5)   // [], len=0, cap=5\n\n// Common mistake: make([]int, 5) creates 5 ZEROED elements\n// vs make([]int, 0, 5) which creates empty slice with capacity\n```\n\n### nil vs Empty Slice\n\n```go\nvar nilSlice []int        // nil slice: ptr=nil, len=0, cap=0\nemptySlice := []int{}     // empty slice: ptr=valid, len=0, cap=0\nemptyMake := make([]int, 0) // same as above\n\n// Key difference:\n// - nil slice can be appended to (creates new array)\n// - nil slice serializes to JSON as \"null\"\n```\n\n### Slicing (No Copy!)\n\n```go\noriginal := []int{1, 2, 3, 4, 5}\n\n// slice[start:end] \u2014 creates new slice header\n// SHARES the same underlying array!\n\ns1 := original[1:4]    // [2, 3, 4], len=3, cap=4\ns2 := original[:3]     // [1, 2, 3], len=3, cap=5\ns3 := original[2:]     // [3, 4, 5], len=3, cap=3\n\n// s1, s2, s3 all point to SAME underlying array\n```\n\n### Full Slice Expression (Cap Limit)\n\n```go\nbase := []int{1, 2, 3, 4, 5}\n\nview := base[:2]     // len=2, cap=5\nsafe := base[:2:2]   // len=2, cap=2\n\nview = append(view, 99)\nfmt.Println(base)    // [1 2 99 4 5]  -- same backing array reused\n\nsafe = append(safe, 77)\nfmt.Println(base)    // [1 2 99 4 5]  -- unchanged this time\n```\n\n> **Use case**: `a[i:j:j]` limits capacity so the next `append` must allocate a new backing array. Great for avoiding accidental overwrite of sibling slices.\n\n---\n\n## 3. Append Mechanics\n\n### Basic Append\n\n```go\ns := []int{1, 2, 3}\ns = append(s, 4)    // [1, 2, 3, 4]\ns = append(s, 5, 6) // [1, 2, 3, 4, 5, 6]\n\n// append returns NEW slice (may be same backing array or new)\n```\n\n### Growth Strategy\n\n| Current Capacity | New Capacity |\n|-----------------|--------------|\n| 0 | 1 |\n| \u2264 1024 | 2\u00d7 |\n| > 1024 | 1.25\u00d7 |\n\n```go\n// When capacity exceeded, Go:\n// 1. Allocates new array (2\u00d7 or 1.25\u00d7 cap)\n// 2. Copies existing elements\n// 3. Adds new elements\n// 4. Returns new slice header with new pointer\n```\n\n### Spread Operator\n\n```go\nbase := []int{1, 2, 3}\nextra := []int{4, 5, 6}\n\ncombined := append(base, extra...)  // [1, 2, 3, 4, 5, 6]\n\n// Same as:\ncombined = append(base, extra[0], extra[1], extra[2])\n```\n\n### Efficient Patterns\n\n```go\n// Pre-allocate for known size\ns := make([]int, 0, 100)\nfor i := 0; i < 100; i++ {\n    s = append(s, i)\n}\n\n// In-place filtering (s[:n] pattern)\nfunc filter(s []int, keep func(int) bool) []int {\n    n := 0\n    for _, v := range s {\n        if keep(v) {\n            s[n] = v\n            n++\n        }\n    }\n    return s[:n]\n}\n```\n\n---\n\n## 4. Common Operations\n\n### Copy\n\n```go\nsrc := []int{1, 2, 3}\ndst := make([]int, len(src))\nn := copy(dst, src)  // returns 3 (elements copied)\n\n// copy returns min(len(src), len(dst))\n// Does NOT resize dst\n```\n\n### Delete by Index\n\n```go\ns := []int{1, 2, 3, 4, 5}\n\n// Delete at index i\ni := 2\ns = append(s[:i], s[i+1:]...)  // [1, 2, 4, 5]\n\n// Delete first element\ns = s[1:]  // O(n) \u2014 shifts elements\n\n// Delete last element\ns = s[:len(s)-1]  // O(1) \u2014 just shrinks\n```\n\n### Prepend\n\n```go\ns := []int{3, 4, 5}\n\n// Prepend is expensive \u2014 requires shifting all elements\ns = append([]int{1, 2}, s...)  // [1, 2, 3, 4, 5]\n\n// Better: use linked list or prepend to head, reverse later\n```\n\n### Filter & Map\n\n```go\n// Filter\nfunc filter(s []int, fn func(int) bool) []int {\n    result := s[:0]  // reuse backing array\n    for _, v := range s {\n        if fn(v) {\n            result = append(result, v)\n        }\n    }\n    return result\n}\n\n// Map\nfunc mapSlice(s []int, fn func(int) int) []int {\n    result := make([]int, len(s))\n    for i, v := range s {\n        result[i] = fn(v)\n    }\n    return result\n}\n```\n\n### Sort\n\n```go\nimport \"sort\"\n\ns := []int{3, 1, 4, 1, 5, 9}\n\n// Ints sorts in ascending order\nsort.Ints(s)  // modifies in place\n\n// Sort custom types\npeople := []struct{ Name string; Age int }{\n    {\"Alice\", 30}, {\"Bob\", 25},\n}\nsort.Slice(people, func(i, j int) bool {\n    return people[i].Age < people[j].Age\n})\n\n// Check if sorted\nsort.IntsAreSorted(s)  // bool\n```\n\n---\n\n## 5. 2D Slices\n\n### Jagged Arrays (Rows with Different Lengths)\n\n```go\n// Create 3x variable matrix\nmatrix := make([][]int, 3)\nfor i := range matrix {\n    matrix[i] = make([]int, i+1)  // [1], [2,2], [3,3,3]\n}\n\n// Or with literals\njagged := [][]int{\n    {1, 2},\n    {3, 4, 5},\n    {6},\n}\n```\n\n### 2D Slice Anatomy\n\n```\njagged := [][]int{\n    {1, 2},     // row 0: ptr\u2192[1,2],   len=2, cap=2\n    {3, 4, 5},  // row 1: ptr\u2192[3,4,5], len=3, cap=3\n    {6},        // row 2: ptr\u2192[6],     len=1, cap=1\n}\n```\n\n### Pass-by-Value Behavior\n\n```go\nfunc modifySlice(s []int) {\n    s[0] = 100       // modifies underlying array \u2713\n    s = append(s, 5) // new backing array, s is local\n}\n\noriginal := []int{1, 2, 3}\nmodifySlice(original)\nfmt.Println(original)  // [100, 2, 3] \u2014 first element changed!\n```\n\n---\n\n## 6. Gotchas\n\n### Slicing Doesn't Copy Data\n\n```go\na := []int{1, 2, 3, 4, 5}\nb := a[1:3]\n\nb[0] = 99  // modifies a[1] too!\nfmt.Println(a)  // [1, 99, 3, 4, 5]\n\n// Solution: copy if you need independent slice\nb = make([]int, len(b))\ncopy(b, a[1:3])\n```\n\n### Small Slice, Large Memory Retention\n\n```go\nfunc first100(data []byte) []byte {\n    return data[:100] // still keeps the entire backing array alive\n}\n\nfunc first100Safe(data []byte) []byte {\n    out := make([]byte, 100)\n    copy(out, data[:100])\n    return out\n}\n```\n\n> **Senior gotcha**: Returning a tiny subslice of a huge buffer can keep megabytes alive. Copy when the original buffer should be released.\n\n### Loop Variable Capture (Fixed in Go 1.22)\n\n```go\n// Go < 1.22 gotcha\nvar funcs []func()\nfor i := 0; i < 3; i++ {\n    funcs = append(funcs, func() { fmt.Println(i) })\n}\nfor _, f := range funcs {\n    f()  // prints 3, 3, 3 (captures same i)\n}\n\n// Fix: capture loop variable\nfor i := 0; i < 3; i++ {\n    i := i  // create new variable\n    funcs = append(funcs, func() { fmt.Println(i) })\n}\n```\n\n### Append to Same Slice in Loop\n\n```go\ns := []int{1, 2, 3}\nfor i := 0; i < 10; i++ {\n    s = append(s, i)  // append may allocate new backing array\n    // Using s here might reference stale array!\n}\n\n// Safe approach\ns := make([]int, 0, 100)  // pre-allocate\nfor i := 0; i < 100; i++ {\n    s = append(s, i)\n}\n```\n\n### Slice of Structs with Pointers\n\n```go\ntype Item struct {\n    Value  string\n    Data   *bytes.Buffer\n}\n\nitems := []Item{\n    {Value: \"a\", Data: bytes.NewBufferString(\"x\")},\n    {Value: \"b\", Data: bytes.NewBufferString(\"y\")},\n}\n\n// Copying slice copies STRUCT VALUES (including pointers)\n// Both slices reference same underlying *bytes.Buffer\nitems2 := append([]Item{}, items...)\n\nitems2[0].Value = \"modified\"       // safe: copies string\nitems2[0].Data.WriteString(\"z\")     // DANGER: modifies items[0].Data!\n```\n\n---\n\n## Quick Reference\n\n```go\n// Creation\nmake([]T, len)       // len with zeroed elements\nmake([]T, len, cap)  // len with capacity cap\n[]T{...}             // literal\ns[:mid]              // slice without copy\n\n// Operations\nappend(s, elems...)  // append elements\ncopy(dst, src)       // copy elements\nlen(s), cap(s)       // get dimensions\n\n// Deletion\ns = append(s[:i], s[i+1:]...)  // delete index i\ns = s[1:]                      // delete first\ns = s[:len(s)-1]               // delete last\n\n// Tricks\ns[:0]              // empty slice, same backing array\ns = s[:len(s)+1]   // panics if cap exceeded\n```\n\n---\n\n## Complexity Summary\n\n| Operation | Time | Space |\n|-----------|------|-------|\n| `len(s)` / `cap(s)` | O(1) | - |\n| Index access `s[i]` | O(1) | - |\n| Append (within capacity) | O(1)* | O(1) |\n| Append (exceeds capacity) | O(n) | O(n) |\n| Slice `s[i:j]` | O(1) | O(1) |\n| Copy | O(n) | O(n) |\n| Delete element | O(n) | O(1)** |\n| Prepend | O(n) | O(n) |\n\n*Amortized  \n**Does not reclaim memory\n\n---\n\n## Interview Tips\n\n1. **Draw the slice header** \u2014 visualize pointer, len, cap\n2. **Append returns new slice** \u2014 the returned value may have different cap\n3. **Slicing is cheap** \u2014 no data copy, just new header\n4. **nil slice vs empty slice** \u2014 nil can be appended to, empty cannot be distinguished by len\n5. **Prefer pre-allocation** \u2014 `make([]T, 0, n)` when size is known\n"}, {"id": "go_goroutines", "file": "go-goroutines.md", "title": "Concurrency", "time": "25 min", "icon": "\u26a1", "content": "# Go Concurrency: Goroutines & Channels Cheatsheet\n\n> Master Go's concurrency model \u2014 the most important differentiator for Go interviews.\n\n---\n\n## Table of Contents\n1. [Goroutines](#1-goroutines)\n2. [Channels](#2-channels)\n3. [Select](#3-select)\n4. [sync Package](#4-sync-package)\n5. [Concurrency Patterns](#5-concurrency-patterns)\n6. [Context Package](#6-context-package)\n7. [Common Pitfalls](#7-common-pitfalls)\n\n---\n\n## 1. Goroutines\n\n### Basics\n\n```go\n// goroutine = lightweight thread managed by Go runtime\ngo f(x, y)  // starts new goroutine, runs f concurrently\n\n// Example\nfunc main() {\n    go sayHello()           // runs concurrently\n    go func() {            // anonymous goroutine\n        fmt.Println(\"anonymous\")\n    }()\n    time.Sleep(time.Second) // don't do this in real code!\n}\n```\n\n### How They Work\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502                  Process                     \u2502\n\u2502  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502              Go Runtime                \u2502  \u2502\n\u2502  \u2502  \u250c\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2510     \u2502  \u2502\n\u2502  \u2502  \u2502 G1  \u2502 \u2502 G2  \u2502 \u2502 G3  \u2502 \u2502 G4  \u2502 ... \u2502  \u2502\n\u2502  \u2502  \u2514\u2500\u2500\u252c\u2500\u2500\u2518 \u2514\u2500\u2500\u252c\u2500\u2500\u2518 \u2514\u2500\u2500\u2500\u2500\u2500\u2518 \u2514\u2500\u2500\u2500\u2500\u2500\u2518     \u2502  \u2502\n\u2502  \u2502     \u2502        \u2502                          \u2502  \u2502\n\u2502  \u2502  \u250c\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2510                       \u2502  \u2502\n\u2502  \u2502  \u2502   M: Machine \u2502 (OS thread, ~1MB)     \u2502  \u2502\n\u2502  \u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518                       \u2502  \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2502                                             \u2502\n\u2502  Goroutine stack: starts at 2KB, grows to ~1GB \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Key Properties\n\n| Property | Value |\n|----------|-------|\n| Stack size | Starts at 2KB, grows dynamically |\n| OS thread | Multiple multiplexed onto few OS threads |\n| Creation | ~3KB (vs ~1MB for threads) |\n| Switching | ~200-300ns (vs ~1000ns for threads) |\n| Max goroutines | Limited only by memory |\n\n```go\n// How many goroutines can run?\n// Answer: Hundreds of thousands on a single machine\nfor i := 0; i < 100000; i++ {\n    go func() {\n        time.Sleep(time.Hour)  // idle goroutines use ~2KB each\n    }()\n}\n```\n\n### Starting & Waiting\n\n```go\n// DON'T: time.Sleep hack\ngo doWork()\ntime.Sleep(time.Second)  // \u274c racy, wastes resources\n\n// DO: Use sync.WaitGroup\nvar wg sync.WaitGroup\nfor i := 0; i < 5; i++ {\n    wg.Add(1)\n    go func(id int) {\n        defer wg.Done()  // ALWAYS defer!\n        doWork(id)\n    }(i)\n}\nwg.Wait()  // blocks until all Done\n\n// DO: Use channel (idiomatic)\ndone := make(chan struct{})\ngo func() {\n    doWork()\n    close(done)\n}()\n<-done  // blocks until closed\n```\n\n---\n\n## 2. Channels\n\n### Channel Basics\n\n```go\n// Create unbuffered channel\nch := make(chan int)\n\n// Create buffered channel\nch := make(chan int, 10)\n\n// Send (blocks until receiver ready for unbuffered)\nch <- 42\n\n// Receive (blocks until sender ready for unbuffered)\nvalue := <-ch\n\n// Close (sender indicates no more values)\nclose(ch)\n\n// Directional channels (for function parameters)\nfunc producer(ch chan<- int)  {}  // send-only\nfunc consumer(ch <-chan int) {}  // receive-only\n```\n\n### Buffered vs Unbuffered\n\n```go\n// Unbuffered: Synchronous rendezvous\n// - Send blocks until another goroutine receives\n// - Receive blocks until another goroutine sends\n// - Used for synchronization\n\nunbuf := make(chan int)\n\n// Buffered: Asynchronous (up to capacity)\n// - Send blocks only when full\n// - Receive blocks only when empty\n// - Used for buffering/async processing\n\nbuf := make(chan int, 3)\n```\n\n### Send/Receive Rules\n\n```go\nch := make(chan int, 1)\n\n// Send to nil channel: blocks forever\n// var nilCh chan int\n// nilCh <- 1  // deadlock\n\n// Receive from nil channel: blocks forever\n// x := <-nilCh  // deadlock\n\n// Send to closed channel: panics\n// close(ch)\nch <- 1\nclose(ch)\n// ch <- 2  // panic: send on closed channel\n\n// Receive from closed channel: returns zero value immediately\nch2 := make(chan int, 1)\nch2 <- 42\nclose(ch2)\nval, ok := <-ch2  // val=42, ok=true\nval, ok = <-ch2   // val=0, ok=false (zero value, channel closed)\n```\n\n### Range & Close\n\n```go\n// Range over channel (exits when closed)\nch := make(chan int, 5)\nfor i := 0; i < 5; i++ {\n    ch <- i\n}\nclose(ch)\n\nfor v := range ch {  // exits when ch closed\n    fmt.Println(v)\n}\n\n// Checking if channel is closed\nfunc isClosed(ch <-chan int) (int, bool) {\n    select {\n    case v, ok := <-ch:\n        return v, ok\n    default:\n        return 0, false\n    }\n}\n```\n\n### Channel Patterns\n\n```go\n// Done channel pattern\nfunc worker(done <-chan bool) {\n    for {\n        select {\n        case <-done:\n            return\n        default:\n            // do work\n        }\n    }\n}\n\n// Pipeline pattern\nfunc pipeline(in <-chan int) <-chan int {\n    out := make(chan int)\n    go func() {\n        defer close(out)\n        for v := range in {\n            out <- v * 2\n        }\n    }()\n    return out\n}\n\n// Fan-out: distribute work\nfunc fanOut(jobs <-chan Job, numWorkers int) <-chan Result {\n    results := make(chan Result)\n    var wg sync.WaitGroup\n    \n    for i := 0; i < numWorkers; i++ {\n        wg.Add(1)\n        go func() {\n            defer wg.Done()\n            for job := range jobs {\n                results <- process(job)\n            }\n        }()\n    }\n    \n    go func() {\n        wg.Wait()\n        close(results)\n    }()\n    return results\n}\n```\n\n---\n\n## 3. Select\n\n### Select Basics\n\n```go\n// select blocks until one case can proceed\nselect {\ncase msg := <-ch1:\n    fmt.Println(msg)\ncase ch2 <- 42:\n    fmt.Println(\"sent\")\ncase <-time.After(time.Second):\n    fmt.Println(\"timeout\")\n}\n\n// select with default (non-blocking)\nselect {\ncase msg := <-ch:\n    fmt.Println(msg)\ndefault:\n    fmt.Println(\"no message ready\")\n}\n```\n\n### Select with Multiple Receives\n\n```go\n// Receive from first ready channel\nselect {\ncase msg1 := <-ch1:\n    fmt.Println(\"from ch1:\", msg1)\ncase msg2 := <-ch2:\n    fmt.Println(\"from ch2:\", msg2)\ncase msg3 := <-ch3:\n    fmt.Println(\"from ch3:\", msg3)\n}\n\n// Random selection when multiple ready\n// Go randomly picks if multiple cases are ready\n```\n\n### Select with Nil Channels\n\n```go\nvar ch1 chan int\nch2 := make(chan int)\n\n// nil channels block forever in select\nselect {\ncase <-ch1:  // blocks (ch1 is nil)\n    fmt.Println(\"ch1\")\ncase <-ch2:\n    fmt.Println(\"ch2\")\n}\n\n// Useful for optional channels\nvar optionalCh chan int  // nil = disabled\nselect {\ncase <-optionalCh:  // never selected\n    fmt.Println(\"never\")\ncase <-done:\n    fmt.Println(\"done\")\n}\n```\n\n### Timeout Pattern\n\n```go\n// Timeout using time.After (creates timer each call - use carefully)\nfunc withTimeout(ch <-chan Result) (Result, error) {\n    select {\n    case result := <-ch:\n        return result, nil\n    case <-time.After(5 * time.Second):\n        return nil, errors.New(\"timeout\")\n    }\n}\n\n// Better: reuse single timer\nfunc withTimeoutBetter(ch <-chan Result, timeout time.Duration) (Result, error) {\n    timer := time.NewTimer(timeout)\n    defer timer.Stop()\n    \n    select {\n    case result := <-ch:\n        return result, nil\n    case <-timer.C:\n        return nil, errors.New(\"timeout\")\n    }\n}\n\n// Best: use context (see Context section)\n```\n\n---\n\n## 4. sync Package\n\n### sync.Mutex\n\n```go\ntype Counter struct {\n    mu    sync.Mutex\n    value int\n}\n\nfunc (c *Counter) Increment() {\n    c.mu.Lock()          // acquire lock\n    defer c.mu.Unlock()  // release on return\n    c.value++\n}\n\nfunc (c *Counter) Value() int {\n    c.mu.Lock()\n    defer c.mu.Unlock()\n    return c.value\n}\n\n// \u26a0\ufe0f Never unlock unlocked mutex (panic)\n// \u26a0\ufe0f Never lock mutex twice from same goroutine (deadlock)\n```\n\n### sync.RWMutex\n\n```go\ntype Cache struct {\n    mu    sync.RWMutex\n    items map[string]string\n}\n\nfunc (c *Cache) Get(key string) string {\n    c.mu.RLock()  // many readers allowed\n    defer c.mu.RUnlock()\n    return c.items[key]\n}\n\nfunc (c *Cache) Set(key, value string) {\n    c.mu.Lock()   // exclusive access\n    defer c.mu.Unlock()\n    c.items[key] = value\n}\n```\n\n### sync.WaitGroup\n\n```go\nvar wg sync.WaitGroup\n\nfor i := 0; i < 10; i++ {\n    wg.Add(1)              // increment counter\n    go func(id int) {\n        defer wg.Done()    // decrement when done\n        process(id)\n    }(i)\n}\n\nwg.Wait()  // block until counter = 0\n\n// Common mistake: Add() in loop is racy if not synchronized\n// Solution: Add() before goroutine\nfor i := 0; i < 10; i++ {\n    wg.Add(1)\n    go func() {\n        defer wg.Done()\n        // work\n    }()\n}\n```\n\n### sync.Once\n\n```go\nvar (\n    once sync.Once\n    connection *Conn\n)\n\nfunc getConnection() *Conn {\n    once.Do(func() {\n        // executed exactly once, even with concurrent calls\n        connection = connect()\n    })\n    return connection\n}\n\n// Use for: lazy initialization, singleton pattern\n```\n\n### sync.Cond\n\n```go\ncond := sync.NewCond(&sync.Mutex{})\n\n// Waiting\ncond.L.Lock()\nfor !condition() {\n    cond.Wait()  // blocks, then reacquires lock\n}\nprocess()\ncond.L.Unlock()\n\n// Signaling\ncond.L.Lock()\nupdateCondition()\ncond.Signal()  // wake one waiter\n// or\ncond.Broadcast()  // wake all waiters\ncond.L.Unlock()\n\n// \u26a0\ufe0f Always use in a loop, not if (Wait() can wake spuriously)\n```\n\n### sync.Map\n\n```go\nvar m sync.Map\n\n// Store\nm.Store(\"key\", \"value\")\n\n// Load\nval, ok := m.Load(\"key\")\n\n// LoadOrStore\nval, loaded := m.LoadOrStore(\"key\", \"default\")\n\n// Delete\nm.Delete(\"key\")\n\n// Range\nm.Range(func(k, v any) bool {\n    fmt.Printf(\"%s: %s\\n\", k, v)\n    return true  // false to stop\n})\n\n// \u26a0\ufe0f sync.Map is optimized for specific patterns\n// For most cases: mutex + map is faster and simpler\n```\n\n### sync.Pool\n\n```go\n// Pool of reusable objects (not goroutine-safe for the objects)\nvar bufPool = sync.Pool{\n    New: func() any {\n        return make([]byte, 4096)\n    },\n}\n\n// Get from pool\nbuf := bufPool.Get().([]byte)\n// ... use buf ...\nbufPool.Put(buf)  // return to pool\n\n// Use for: reducing allocations in hot paths\n// Not for: storing connection pools (use proper pooling libraries)\n```\n\n### sync/atomic\n\n```go\nimport \"sync/atomic\"\n\n// Atomic operations on int32/int64/uint32/uint64/uintptr\nvar counter int64\n\natomic.AddInt64(&counter, 1)       // add\natomic.LoadInt64(&counter)        // read\natomic.StoreInt64(&counter, 0)    // write\natomic.SwapInt64(&counter, 100)   // swap and return old\natomic.CompareAndSwapInt64(&counter, old, new)  // CAS\n\n// Atomic pointers (for struct pointers)\nvar ptr atomic.Value\nptr.Store(someStruct)\nloaded := ptr.Load().(*Struct)\n\n// \u26a0\ufe0f Atomic values must be 1, 2, 4, or 8 bytes (or any \"alignable\" size)\n```\n\n---\n\n## 5. Concurrency Patterns\n\n### Producer-Consumer\n\n```go\nfunc producer(ch chan<- int) {\n    for i := 0; i < 10; i++ {\n        ch <- i\n    }\n    close(ch)\n}\n\nfunc consumer(ch <-chan int, done chan<- struct{}) {\n    for v := range ch {\n        fmt.Println(v)\n    }\n    done <- struct{}{}\n}\n\nfunc main() {\n    ch := make(chan int, 5)\n    done := make(chan struct{})\n    \n    go producer(ch)\n    go consumer(ch, done)\n    \n    <-done\n}\n```\n\n### Worker Pool\n\n```go\nfunc workerPool(numWorkers int, jobs <-chan Job) <-chan Result {\n    results := make(chan Result, numWorkers)\n    \n    var wg sync.WaitGroup\n    for i := 0; i < numWorkers; i++ {\n        wg.Add(1)\n        go func() {\n            defer wg.Done()\n            for job := range jobs {\n                results <- processJob(job)\n            }\n        }()\n    }\n    \n    go func() {\n        wg.Wait()\n        close(results)\n    }()\n    \n    return results\n}\n\n// Usage\njobs := make(chan Job, 100)\nfor _, j := range jobList {\n    jobs <- j\n}\nclose(jobs)\n\nfor result := range workerPool(5, jobs) {\n    // handle result\n}\n```\n\n### Semaphore\n\n```go\n// Semaphore using buffered channel\nfunc semaphore(maxConcurrent int, tasks []func()) {\n    sem := make(chan struct{}, maxConcurrent)\n    var wg sync.WaitGroup\n    \n    for _, task := range tasks {\n        wg.Add(1)\n        sem <- struct{}{}  // acquire\n        go func(t func()) {\n            defer wg.Done()\n            defer func() { <-sem }()  // release\n            t()\n        }(task)\n    }\n    \n    wg.Wait()\n}\n```\n\n### Rate Limiting\n\n```go\n// Token bucket rate limiter\ntype RateLimiter struct {\n    rate     float64\n    tokens   float64\n    max      float64\n    lastTime time.Time\n    mu       sync.Mutex\n}\n\nfunc NewRateLimiter(rate float64, burst int) *RateLimiter {\n    return &RateLimiter{\n        rate:     rate,\n        max:      float64(burst),\n        tokens:   float64(burst),\n        lastTime: time.Now(),\n    }\n}\n\nfunc (r *RateLimiter) Allow() bool {\n    r.mu.Lock()\n    defer r.mu.Unlock()\n    \n    now := time.Now()\n    elapsed := now.Sub(r.lastTime).Seconds()\n    r.lastTime = now\n    \n    r.tokens += elapsed * r.rate\n    if r.tokens > r.max {\n        r.tokens = r.max\n    }\n    \n    if r.tokens >= 1 {\n        r.tokens--\n        return true\n    }\n    return false\n}\n\n// Usage\nlimiter := NewRateLimiter(100, 50)  // 100 req/sec, burst 50\n\nfor _, req := range requests {\n    if limiter.Allow() {\n        process(req)\n    } else {\n        time.Sleep(time.Millisecond)\n    }\n}\n```\n\n### Pipeline with Cancellation\n\n```go\nfunc pipeline(ctx context.Context, data []int) (<-chan int, <-chan error) {\n    out := make(chan int)\n    errCh := make(chan error, 1)\n    \n    go func() {\n        defer close(out)\n        \n        for _, v := range data {\n            select {\n            case <-ctx.Done():\n                errCh <- ctx.Err()\n                return\n            case out <- v * 2:\n            }\n        }\n    }()\n    \n    return out, errCh\n}\n\n// Usage\nctx, cancel := context.WithCancel(context.Background())\ndefer cancel()\n\nout, errCh := pipeline(ctx, []int{1, 2, 3, 4, 5})\nfor v := range out {\n    fmt.Println(v)\n}\n\nselect {\ncase err := <-errCh:\n    fmt.Println(\"error:\", err)\ndefault:\n}\n```\n\n### Fan-In (Merge Channels)\n\n```go\nfunc fanIn(channels ...<-chan int) <-chan int {\n    out := make(chan int)\n    var wg sync.WaitGroup\n    \n    for _, ch := range channels {\n        wg.Add(1)\n        go func(c <-chan int) {\n            defer wg.Done()\n            for v := range c {\n                out <- v\n            }\n        }(ch)\n    }\n    \n    go func() {\n        wg.Wait()\n        close(out)\n    }()\n    \n    return out\n}\n\n// Usage\nch1 := generator(1, 2, 3)\nch2 := generator(4, 5, 6)\nmerged := fanIn(ch1, ch2)\n```\n\n---\n\n## 6. Context Package\n\n### Context Basics\n\n```go\n// context.Context carries deadlines, cancellation, request-scoped values\n\n// Creation\nctx := context.Background()           // empty context, used at top level\nctx := context.TODO()                 // placeholder, used when context type unclear\n\n// Cancellation\nctx, cancel := context.WithCancel(ctx)\ncancel()  // cancel the context\n\n// Timeout\nctx, cancel := context.WithTimeout(ctx, 5*time.Second)\ndefer cancel()\n\n// Deadline\ndeadline := time.Now().Add(24 * time.Hour)\nctx, cancel := context.WithDeadline(ctx, deadline)\ndefer cancel()\n\n// Values\nctx := context.WithValue(ctx, key, value)\nvalue := ctx.Value(key)  // returns nil if not found\n```\n\n### Context Propagation\n\n```go\nfunc handler(ctx context.Context, w http.ResponseWriter, r *http.Request) {\n    // Add timeout\n    ctx, cancel := context.WithTimeout(ctx, 5*time.Second)\n    defer cancel()\n    \n    // Pass to downstream\n    result, err := db.Query(ctx, \"SELECT ...\")\n    \n    // Check cancellation\n    select {\n    case <-ctx.Done():\n        return ctx.Err()\n    default:\n        // continue\n    }\n}\n\nfunc dbQuery(ctx context.Context, query string) error {\n    // Use ctx with database calls\n    rows, err := db.QueryContext(ctx, query)\n    // ...\n}\n```\n\n### Custom Context Keys\n\n```go\n// Use unexported type to prevent collisions\ntype key int\n\nconst (\n    requestIDKey key = iota\n    userIDKey\n)\n\nfunc WithRequestID(ctx context.Context, id string) context.Context {\n    return context.WithValue(ctx, requestIDKey, id)\n}\n\nfunc GetRequestID(ctx context.Context) string {\n    if id, ok := ctx.Value(requestIDKey).(string); ok {\n        return id\n    }\n    return \"\"\n}\n\n// Usage\nctx := WithRequestID(context.Background(), \"req-123\")\nid := GetRequestID(ctx)  // \"req-123\"\n```\n\n---\n\n## 7. Common Pitfalls\n\n### Goroutine Leaks\n\n```go\n// \u274c LEAK: goroutine blocks forever\nfunc leak() {\n    ch := make(chan int)\n    go func() {\n        ch <- 42  // blocks forever (no receiver)\n    }()\n}\n\n// \u2705 FIX: Always ensure goroutine can exit\nfunc noLeak() {\n    ch := make(chan int, 1)  // buffered, sender won't block\n    go func() {\n        ch <- 42\n        // goroutine exits after send\n    }()\n}\n\n// Or use context cancellation\nfunc withCancel(ctx context.Context) {\n    ch := make(chan int)\n    go func() {\n        select {\n        case <-ctx.Done():\n            return  // exit on cancellation\n        case ch <- 42:\n        }\n    }()\n}\n```\n\n### Race Conditions\n\n```go\n// \u274c RACE: concurrent map access\nvar m = make(map[string]int)\ngo func() { m[\"a\"] = 1 }()\ngo func() { m[\"b\"] = 2 }()  // DATA RACE!\n\n// \u2705 FIX 1: Mutex\nvar (\n    mu sync.Mutex\n    m  = make(map[string]int)\n)\ngo func() {\n    mu.Lock()\n    m[\"a\"] = 1\n    mu.Unlock()\n}()\n\n// \u2705 FIX 2: sync.Map (for specific patterns)\nvar m sync.Map\ngo func() { m.Store(\"a\", 1) }()\ngo func() { m.Store(\"b\", 2) }()\n\n// \u2705 FIX 3: atomic.Value (for single value)\nvar v atomic.Value\nv.Store(someStruct)\n```\n\n### Deadlock\n\n```go\n// \u274c DEADLOCK: waiting for each other\nch1 := make(chan int)\nch2 := make(chan int)\n\ngo func() {\n    <-ch1         // waits for ch2\n    ch2 <- 42\n}()\n\ngo func() {\n    <-ch2         // waits for ch1\n    ch1 <- 42\n}()\n\n// \u2705 FIX: Use buffered channels or different ordering\nch1 := make(chan int, 1)  // buffer prevents deadlock\nch2 := make(chan int, 1)\n```\n\n### Nil Channel\n\n```go\nvar ch chan int  // nil channel\n\n// \u274c DEADLOCK: sends/receives on nil channel block forever\ngo func() { ch <- 42 }()\n<-ch\n\n// \u2705 Use nil channel to disable select cases\nvar optionalCh chan int  // nil = disabled in select\nselect {\ncase <-optionalCh:  // never selected\ndefault:\n    // executed immediately\n}\n```\n\n### Closed Channel Misuse\n\n```go\nch := make(chan int, 2)\nch <- 1\nch <- 2\nclose(ch)\n\n// \u274c PANIC: send on closed channel\n// ch <- 3\n\n// \u2705 Receive after close (safe, returns zero value)\nfor v := range ch {\n    fmt.Println(v)\n}\n\n// \u2705 Check close status with ok\nv, ok := <-ch\nif !ok {\n    // channel closed\n}\n\n// \u26a0\ufe0f Close channel only when sender is done sending\n// \u26a0\ufe0f Multiple senders: use done channel, not close\n```\n\n### Loop Variable Capture\n\n```go\n// \u274c Go < 1.22: captures wrong value\nfor _, url := range urls {\n    go fetch(url)  // all goroutines see last url\n}\n\n// \u2705 FIX 1: Capture variable\nfor _, url := range urls {\n    url := url  // new variable\n    go fetch(url)\n}\n\n// \u2705 FIX 2: Pass as argument (Go 1.22+)\nfor _, url := range urls {\n    go fetch(url)  // correctly captured in Go 1.22+\n}\n\n// \u2705 FIX 3: Use index\nfor i := range urls {\n    go fetch(urls[i])\n}\n```\n\n---\n\n## Quick Reference\n\n### Channel Types\n\n```go\nchan T           // send and receive\nchan<- T        // send only\n<-chan T        // receive only\nmake(chan T)           // unbuffered\nmake(chan T, n)        // buffered with capacity n\n```\n\n### Sync Primitives\n\n| Primitive | Use |\n|-----------|-----|\n| `sync.Mutex` | Protect shared data |\n| `sync.RWMutex` | Read-heavy shared data |\n| `sync.WaitGroup` | Wait for goroutines |\n| `sync.Once` | One-time initialization |\n| `sync.Cond` | Notify waiting goroutines |\n| `sync.Map` | Concurrent-safe map |\n| `sync.Pool` | Object reuse |\n| `sync/atomic` | Atomic operations |\n\n### Context Functions\n\n```go\ncontext.Background()\ncontext.TODO()\ncontext.WithCancel(parent)\ncontext.WithTimeout(parent, duration)\ncontext.WithDeadline(parent, time)\ncontext.WithValue(parent, key, value)\nctx.Done()      // returns channel that's closed on cancel\nctx.Err()       // returns error if cancelled\nctx.Value(key)  // get value\n```\n\n---\n\n## Interview Tips\n\n1. **Goroutines vs Threads**: Go manages goroutines (2KB stack, ~200ns switch) vs OS threads (1MB, ~1000ns)\n2. **Channels**: Prefer channels for ownership transfer, mutexes for short critical sections\n3. **Don't communicate by sharing memory; share memory by communicating**\n4. **Context is for cancellation**: Pass it through all request paths\n5. **Race detector**: Always test with `go test -race`\n6. **Deadlock vs Livelock**: Deadlock = blocked; Livelock = keep moving but make no progress\n7. **Select**: Block until first case ready (random if multiple)\n8. **Buffered channels**: Asynchronous (up to capacity), unbuffered = synchronous rendezvous\n"}, {"id": "design_patterns", "file": "design-patterns.md", "title": "Patterns", "time": "20 min", "icon": "\ud83c\udfd7\ufe0f", "content": "# Go Design Patterns Cheatsheet\n\n> Idiomatic Go patterns for system design and interviews.\n\n---\n\n## Table of Contents\n1. [Creational Patterns](#1-creational-patterns)\n2. [Structural Patterns](#2-structural-patterns)\n3. [Behavioral Patterns](#3-behavioral-patterns)\n4. [Concurrency Patterns](#4-concurrency-patterns)\n5. [Error Handling Patterns](#5-error-handling-patterns)\n6. [Context Patterns](#6-context-patterns)\n\n---\n\n## 1. Creational Patterns\n\n### Factory (Function-based)\n\n```go\n// Factory returns interface, hides concrete type\ntype Storage interface {\n    Save(data []byte) error\n}\n\ntype localStorage struct{ path string }\nfunc (s *localStorage) Save(data []byte) error {\n    return os.WriteFile(s.path, data, 0644)\n}\n\n// NewStorage is the factory function\nfunc NewStorage(provider string) (Storage, error) {\n    switch provider {\n    case \"local\":\n        return &localStorage{path: \"/tmp/data\"}, nil\n    case \"s3\":\n        return newS3Storage()  // complex initialization\n    default:\n        return nil, fmt.Errorf(\"unknown provider: %s\", provider)\n    }\n}\n```\n\n### Builder Pattern\n\n```go\ntype Query struct {\n    table      string\n    conditions []string\n    limit      int\n    offset     int\n}\n\ntype QueryBuilder struct {\n    query Query\n}\n\nfunc NewQueryBuilder(table string) *QueryBuilder {\n    return &QueryBuilder{\n        query: Query{table: table},\n    }\n}\n\nfunc (b *QueryBuilder) Where(condition string) *QueryBuilder {\n    b.query.conditions = append(b.query.conditions, condition)\n    return b  // fluent interface\n}\n\nfunc (b *QueryBuilder) Limit(limit int) *QueryBuilder {\n    b.query.limit = limit\n    return b\n}\n\nfunc (b *QueryBuilder) Build() *Query {\n    return &b.query\n}\n\n// Usage\nquery := NewQueryBuilder(\"users\").\n    Where(\"age > 21\").\n    Where(\"status = 'active'\").\n    Limit(10).\n    Build()\n```\n\n### Singleton (sync.Once)\n\n```go\n// Thread-safe singleton using sync.Once\nvar (\n    db   *sql.DB\n    once sync.Once\n)\n\nfunc GetDB() *sql.DB {\n    once.Do(func() {\n        var err error\n        db, err = sql.Open(\"postgres\", \"connection-string\")\n        if err != nil {\n            log.Fatal(err)\n        }\n    })\n    return db\n}\n```\n\n---\n\n## 2. Structural Patterns\n\n### Decorator (Interface Wrapping)\n\n```go\ntype Reader interface {\n    Read(p []byte) (n int, err error)\n}\n\n// BufferedReader wraps another reader\ntype BufferedReader struct {\n    r   Reader\n    buf []byte\n}\n\nfunc (b *BufferedReader) Read(p []byte) (n int, err error) {\n    if len(b.buf) == 0 {\n        b.buf = make([]byte, 1024)\n        _, err = b.r.Read(b.buf)\n        if err != nil {\n            return 0, err\n        }\n    }\n    // ... buffering logic\n    copy(p, b.buf)\n    return len(p), nil\n}\n```\n\n### Adapter (Interface Conversion)\n\n```go\n// Old API\ntype LegacyLogger struct{}\nfunc (l *LegacyLogger) LogInfo(msg string) { /* ... */ }\n\n// New interface we want\ntype Logger interface {\n    Info(msg string)\n    Error(msg string)\n}\n\n// Adapter\ntype LoggerAdapter struct {\n    legacy *LegacyLogger\n}\n\nfunc (a *LoggerAdapter) Info(msg string) {\n    a.legacy.LogInfo(msg)\n}\n\nfunc (a *LoggerAdapter) Error(msg string) {\n    a.legacy.LogInfo(\"ERROR: \" + msg)\n}\n\n// Now we can use Logger interface everywhere\nfunc Process(l Logger) { l.Info(\"started\") }\n```\n\n### Composition over Inheritance\n\n```go\n// Go prefers composition (embedding) over inheritance\n\ntype Animal struct {\n    Name string\n}\n\nfunc (a *Animal) Speak() string {\n    return \"...\"\n}\n\n// Dog embeds Animal (not inherits)\ntype Dog struct {\n    *Animal  // embedded pointer\n    Breed    string\n}\n\nfunc (d *Dog) Speak() string {\n    return d.Animal.Speak() + \" Woof!\"\n}\n\n// Dog automatically \"inherits\" Name field and methods\ndog := &Dog{Animal: &Animal{Name: \"Rex\"}, Breed: \"Labrador\"}\ndog.Name  // \"Rex\" \u2014 promoted field\ndog.Speak() // \"Woof!\" \u2014 overridden method\n```\n\n---\n\n## 3. Behavioral Patterns\n\n### Strategy (Interface for Algorithms)\n\n```go\n// Strategy interface\ntype Comparator func(a, b int) int\n\n// Strategies\nvar Ascending = func(a, b int) int {\n    if a < b return -1\n    if a > b return 1\n    return 0\n}\n\nvar Descending = func(a, b int) int {\n    return -Ascending(a, b)\n}\n\n// Context uses strategy\ntype Sorter struct {\n    data []int\n    cmp  Comparator\n}\n\nfunc (s *Sorter) Sort() {\n    // Use s.cmp for comparison\n    // ... sorting logic\n}\n\n// Usage\nsorter := &Sorter{data: []int{3, 1, 2}, cmp: Ascending}\nsorter.Sort()\n```\n\n### Observer (Channel-based)\n\n```go\ntype Event struct {\n    Type string\n    Data any\n}\n\ntype Observer struct {\n    ch chan Event\n}\n\nfunc (o *Observer) Observe() <-chan Event {\n    return o.ch\n}\n\ntype Publisher struct {\n    subs []chan Event\n    mu   sync.Mutex\n}\n\nfunc (p *Publisher) Subscribe() chan Event {\n    ch := make(chan Event, 100)\n    p.mu.Lock()\n    p.subs = append(p.subs, ch)\n    p.mu.Unlock()\n    return ch\n}\n\nfunc (p *Publisher) Notify(e Event) {\n    p.mu.Lock()\n    defer p.mu.Unlock()\n    for _, ch := range p.subs {\n        select {\n        case ch <- e:\n        default:  // non-blocking\n        }\n    }\n}\n```\n\n### State Machine\n\n```go\ntype State interface {\n    Enter()\n    Exit()\n    Next() State  // returns next state\n}\n\ntype OpenState struct{}\nfunc (s *OpenState) Enter()  { fmt.Println(\"Opening\") }\nfunc (s *OpenState) Exit()   { fmt.Println(\"Closed\") }\nfunc (s *OpenState) Next() State {\n    return &ClosedState{}\n}\n\ntype ClosedState struct{}\nfunc (s *ClosedState) Enter()  { fmt.Println(\"Closed\") }\nfunc (s *ClosedState) Exit()   { fmt.Println(\"Opening\") }\nfunc (s *ClosedState) Next() State {\n    return &OpenState{}\n}\n\n// Machine manages state transitions\ntype Machine struct {\n    current State\n}\n\nfunc (m *Machine) Transition() {\n    m.current.Exit()\n    m.current = m.current.Next()\n    m.current.Enter()\n}\n```\n\n---\n\n## 4. Concurrency Patterns\n\n### Pipeline\n\n```go\nfunc main() {\n    // Stage 1: Generate numbers\n    generator := func(done <-chan struct{}) <-chan int {\n        ch := make(chan int)\n        go func() {\n            defer close(ch)\n            for i := 1; i <= 5; i++ {\n                select {\n                case ch <- i:\n                case <-done:\n                    return\n                }\n            }\n        }()\n        return ch\n    }\n\n    // Stage 2: Double\n    doubler := func(done <-chan struct{}, in <-chan int) <-chan int {\n        out := make(chan int)\n        go func() {\n            defer close(out)\n            for v := range in {\n                select {\n                case out <- v * 2:\n                case <-done:\n                    return\n                }\n            }\n        }()\n        return out\n    }\n\n    // Chain pipeline\n    done := make(chan struct{})\n    defer close(done)\n\n    pipeline := doubler(done, generator(done))\n    \n    for v := range pipeline {\n        fmt.Println(v)  // 2, 4, 6, 8, 10\n    }\n}\n```\n\n### Fan-out / Fan-in\n\n```go\nfunc fanOut(done <-chan struct{}, items []int, workers int) <-chan int {\n    out := make(chan int)\n    \n    // Split work among workers\n    workCh := make(chan int)\n    \n    // Send work\n    go func() {\n        defer close(workCh)\n        for _, item := range items {\n            workCh <- item\n        }\n    }()\n    \n    // Workers\n    var wg sync.WaitGroup\n    for i := 0; i < workers; i++ {\n        wg.Add(1)\n        go func() {\n            defer wg.Done()\n            for item := range workCh {\n                select {\n                case out <- process(item):\n                case <-done:\n                    return\n                }\n            }\n        }()\n    }\n    \n    // Fan-in: collect results\n    go func() {\n        wg.Wait()\n        close(out)\n    }()\n    \n    return out\n}\n```\n\n### Worker Pool\n\n```go\nfunc workerPool(jobs <-chan Job, results chan<- Result, numWorkers int) {\n    var wg sync.WaitGroup\n    \n    for i := 0; i < numWorkers; i++ {\n        wg.Add(1)\n        go func(workerID int) {\n            defer wg.Done()\n            for job := range jobs {\n                result := processJob(job)  // potentially slow\n                results <- re
